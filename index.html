<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e3c3cd; 
            margin: 0;
            padding: 0;
            height: 100vh;
            perspective: 1000px; 
        }

        .container {
            position: absolute;
            top: 20px;
            left: 20px;
            text-align: center;
            background: rgba(255, 182, 193, 0.7); 
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.1s ease-out;
            cursor: pointer;
            user-select: none;
            transform-style: preserve-3d;
        }

        h1 { color: #333; margin-top: 0; }

        .glow-text {
            color: #666; 
            font-weight: bold;
            
            /* 
               45% - 55% creates a narrow sliver. 
               #bbb is a softer, less aggressive highlight than pure white.
            */
            background: linear-gradient(90deg, #666 40%, #bbb 50%, #666 60%);
            
            /* 200% size ensures the glow is smaller relative to the text width */
            background-size: 200% 100%;
            
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            
            animation: shine 8s linear infinite;
        }

        @keyframes shine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>

<body>

    <div class="container" id="tilt-box">
        <h1>JayaBeth</h1>
        <p class="glow-text">Shanky and Reece est. 2024</p>
    </div>

    <script>
        const container = document.getElementById('tilt-box');

        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;

            const rotateX = -y / 10;
            const rotateY = x / 10;

            container.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        container.addEventListener('mouseleave', () => {
            container.style.transform = 'rotateX(0deg) rotateY(0deg)';
        });
    </script>

</body>
</html>
