<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JayaBeth - The Yap Box</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --box-base-rgb: 190, 160, 230; /* Default Lilac */
            --box-alpha: 0.85;
        }

        body { font-family: 'Fredoka', sans-serif; margin: 0; padding: 20px; min-height: 100vh; background: #fff9fa url('avo2.jpg'); background-size: 650px; animation: moveBackground 120s linear infinite; display: flex; justify-content: center; align-items: center; }
        @keyframes moveBackground { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        .main-app-container { display: flex; gap: 30px; align-items: flex-start; }

        /* Shared Box Style */
        .box-style { 
            background-color: rgba(var(--box-base-rgb), var(--box-alpha));
            background-image: radial-gradient(rgba(255, 255, 255, 0.3) 1px, transparent 1px);
            background-size: 20px 20px;
            backdrop-filter: blur(5px); 
            border-radius: 25px; 
            border: 1px solid #000; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1), 0 0 80px rgba(0,0,0,0.05); 
            padding: 15px; 
            box-sizing: border-box; 
        }

        /* Gallery */
        .gallery-container { width: 300px; height: 600px; display: flex; flex-direction: column; }
        .gallery-header { font-weight: bold; color: #333; margin-bottom: 10px; text-align: center; border-bottom: 2px solid rgba(255, 255, 255, 0.5); padding-bottom: 10px; }
        #gallery { flex-grow: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; align-content: flex-start; }
        .gallery-item { position: relative; width: 100%; aspect-ratio: 1; border-radius: 10px; overflow: hidden; cursor: pointer; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.7); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; z-index: 2;}

        /* Chat */
        .chat-container { width: 400px; height: 600px; display: flex; flex-direction: column; position: relative; }
        .btn-reset { position: absolute; top: 20px; left: 20px; background: none; border: none; color: #333; font-size: 11px; cursor: pointer; text-decoration: underline; }
        
        /* Color Menu */
        .color-toggle { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 20px; z-index: 10; }
        .color-menu { display: none; position: absolute; top: 45px; right: 15px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 20; width: 180px; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .color-option { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 1px solid #ccc; }
        .slider-label { font-size: 12px; color: #333; margin-bottom: 5px; font-weight: bold; }
        input[type=range] { width: 100%; }

        .chat-header { font-weight: bold; color: #333; margin-bottom: 15px; text-align: center; padding-bottom: 10px; font-size: 1.3em; border-bottom: 2px solid rgba(255, 255, 255, 0.5); }
        .user-selector { display: flex; justify-content: center; background: rgba(255,255,255,0.4); border-radius: 20px; padding: 4px; width: 180px; margin: 8px auto 0 auto; }
        .user-selector input { display: none; }
        .user-selector label { padding: 5px 15px; cursor: pointer; font-size: 13px; border-radius: 16px; color: #555; flex: 1; text-align: center; transition: 0.2s; }
        .user-selector input:checked + label { background: #8a2be2; color: white; font-weight: bold; }
        
        .messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px; }
        .message-row { display: flex; width: 100%; }
        .message-row.mine { justify-content: flex-end; }
        .message-row.theirs { justify-content: flex-start; }
        
        .msg-wrapper { display: flex; flex-direction: column; max-width: 75%; }
        .msg-wrapper.mine { align-items: flex-end; }
        .msg-wrapper.theirs { align-items: flex-start; }
        
        .bubble { padding: 10px 14px; border-radius: 20px; font-size: 15px; position: relative; word-wrap: break-word; cursor: pointer; white-space: pre-wrap; }
        .bubble-mine { background-color: #8a2be2; color: white; border-bottom-right-radius: 4px; }
        .bubble-theirs { background-color: #ffffff; color: #333; border-bottom-left-radius: 4px; }
        
        /* Link styles */
        .bubble a { color: inherit; text-decoration: underline; font-weight: bold; }
        
        .timestamp { font-size: 10px; color: #444; margin: 2px 5px 0 5px; opacity: 0.7; }
        .quote-box { font-size: 0.75em; background: rgba(0,0,0,0.1); padding: 5px; border-radius: 8px; margin-bottom: 5px; border-left: 3px solid #888; opacity: 0.8; }
        .bubble img { max-width: 200px; display: block; border-radius: 10px; cursor: pointer; }
        .save-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); color: white; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 12px; font-weight: bold; cursor: pointer; z-index: 10; }

        .reply-bar { background: rgba(255,255,255,0.4); padding: 8px; border-radius: 15px; font-size: 12px; margin-bottom: 5px; display: none; position: relative; }
        .chat-inputs { display: flex; flex-direction: row; gap: 8px; margin-top: 10px; }
        .chat-inputs input { flex-grow: 1; padding: 12px 15px; border: none; border-radius: 25px; outline: none; }
        .chat-inputs button { padding: 0 15px; border: none; border-radius: 25px; background: linear-gradient(135deg, #b19cd9, #8a2be2); color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(138, 43, 226, 0.4); transition: all 0.2s ease; }
    </style>
</head>

<body>
    <div id="lightbox" class="lightbox-overlay" onclick="closeLightbox()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); z-index:9999; align-items:center; justify-content:center;">
        <span class="close-lightbox" onclick="closeLightbox()" style="position:absolute; top:30px; right:40px; font-size:40px; color:white; cursor:pointer; font-weight:bold;">&times;</span>
        <img id="lightbox-img" class="lightbox-img" style="max-width:90%; max-height:90%; border-radius:15px;" src="">
    </div>

    <div class="main-app-container">
        <div class="gallery-container box-style">
            <div class="gallery-header">Image Gallery</div>
            <div id="gallery"></div>
        </div>

        <div class="chat-container box-style">
            <button onclick="resetChat()" class="btn-reset">Reset Chat</button>
            <div class="color-toggle" onclick="toggleColorMenu()">🎨</div>
            <div id="colorMenu" class="color-menu">
                <div class="color-grid">
                    <div class="color-option" style="background: rgb(190, 160, 230);" onclick="changeBaseColor('190, 160, 230')"></div>
                    <div class="color-option" style="background: rgb(255, 182, 193);" onclick="changeBaseColor('255, 182, 193')"></div>
                    <div class="color-option" style="background: rgb(173, 216, 230);" onclick="changeBaseColor('173, 216, 230')"></div>
                    <div class="color-option" style="background: rgb(144, 238, 144);" onclick="changeBaseColor('144, 238, 144')"></div>
                    <div class="color-option" style="background: rgb(255, 165, 0);" onclick="changeBaseColor('255, 165, 0')"></div>
                    <div class="color-option" style="background: rgb(255, 99, 71);" onclick="changeBaseColor('255, 99, 71')"></div>
                    <div class="color-option" style="background: rgb(255, 255, 0);" onclick="changeBaseColor('255, 255, 0')"></div>
                </div>
                <div class="slider-label">Transparency/Darkness</div>
                <input type="range" min="0.2" max="1" step="0.1" id="opacitySlider" oninput="changeAlpha(this.value)">
            </div>

            <div class="chat-header">
                The Yap Box
                <div class="user-selector">
                    <input type="radio" id="userShanky" name="userName" value="Shanky" onchange="changeUser(this)">
                    <label for="userShanky">Shanky</label>
                    <input type="radio" id="userReece" name="userName" value="Reece" onchange="changeUser(this)">
                    <label for="userReece">Reece</label>
                </div>
            </div>
            
            <div class="messages" id="messages"></div>
            
            <div id="replyBar" class="reply-bar"></div>
            <div class="chat-inputs">
                <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleImageUpload(event)">
                <button onclick="document.getElementById('fileInput').click()">📷</button>
                <input type="text" id="messageInput" placeholder="Message..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyA6FYNW6L3sUd2Adiyp6M0hG_b1IrNuOEY", 
            authDomain: "jayabeth-fdaad.firebaseapp.com", 
            projectId: "jayabeth-fdaad", 
            storageBucket: "jayabeth-fdaad.firebasestorage.app", 
            messagingSenderId: "716510918759", 
            appId: "1:716510918759:web:35340b83ad2a134cecbcc2" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, "chatroom");
        const galleryRef = ref(db, "gallery");
        
        // Theme Load
        const savedRGB = localStorage.getItem('yapboxRGB') || '190, 160, 230';
        const savedAlpha = localStorage.getItem('yapboxAlpha') || '0.85';
        document.documentElement.style.setProperty('--box-base-rgb', savedRGB);
        document.documentElement.style.setProperty('--box-alpha', savedAlpha);
        document.getElementById('opacitySlider').value = savedAlpha;

        // Helpers
        window.toggleColorMenu = () => {
            const menu = document.getElementById('colorMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        };

        window.changeBaseColor = (rgb) => {
            document.documentElement.style.setProperty('--box-base-rgb', rgb);
            localStorage.setItem('yapboxRGB', rgb);
        };

        window.changeAlpha = (val) => {
            document.documentElement.style.setProperty('--box-alpha', val);
            localStorage.setItem('yapboxAlpha', val);
        };

        const formatTime = (ts) => {
            const date = new Date(ts);
            return date.getHours().toString().padStart(2, '0') + ':' + 
                   date.getMinutes().toString().padStart(2, '0');
        };

        // Convert URLs in text to HTML links
        const formatMessageLinks = (text) => {
            const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
            return text.replace(urlPattern, '<a href="$1" target="_blank">$1</a>');
        };

        // App Logic
        let currentUser = localStorage.getItem('yapboxUser') || 'Shanky';
        let holdTimer = null;
        let replyingTo = null; 

        window.openLightbox = (src) => {
            const lightbox = document.getElementById('lightbox');
            document.getElementById('lightbox-img').src = src;
            lightbox.style.display = 'flex';
        };

        window.closeLightbox = () => {
            document.getElementById('lightbox').style.display = 'none';
        };

        window.startReply = (text, user) => {
            replyingTo = { text: text || "[Image]", user: user };
            const bar = document.getElementById('replyBar');
            bar.style.display = 'block';
            bar.innerHTML = `<strong>Replying to ${user}:</strong> ${text || "[Image]"} <span onclick="cancelReply()" style="cursor:pointer; float:right;">✕</span>`;
        };

        window.cancelReply = () => {
            replyingTo = null;
            document.getElementById('replyBar').style.display = 'none';
        };

        window.startHold = (event, imgData) => {
            holdTimer = setTimeout(() => {
                const target = event.target;
                if(target.parentElement.querySelector('.save-overlay')) return;
                const overlay = document.createElement('div');
                overlay.className = 'save-overlay';
                overlay.innerText = 'Save to Gallery';
                overlay.onclick = () => {
                    push(galleryRef, { image: imgData, timestamp: Date.now() });
                    overlay.innerText = 'Saved!';
                    setTimeout(() => overlay.remove(), 1000);
                };
                target.parentElement.appendChild(overlay);
                setTimeout(() => { if(overlay) overlay.remove(); }, 3000);
            }, 1000); 
        };

        window.endHold = () => clearTimeout(holdTimer);

        window.handleImageUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const scale = 400 / img.width;
                    canvas.width = 400;
                    canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    push(messagesRef, { name: currentUser, image: canvas.toDataURL('image/jpeg', 0.5), timestamp: Date.now(), replyTo: replyingTo });
                    cancelReply();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        };

        window.sendMessage = () => {
            const input = document.getElementById("messageInput");
            if (input.value.trim() === "") return;
            push(messagesRef, { name: currentUser, text: input.value, timestamp: Date.now(), replyTo: replyingTo });
            input.value = "";
            cancelReply();
        };

        window.changeUser = (r) => { localStorage.setItem('yapboxUser', r.value); location.reload(); };
        window.handleKeyPress = (e) => { if (e.key === 'Enter') sendMessage(); };
        window.resetChat = () => { if (confirm("Clear Chat?")) remove(messagesRef); };
        window.deleteGalleryItem = (event, key) => { 
            event.stopPropagation(); 
            remove(child(galleryRef, key)); 
        };

        onValue(messagesRef, (snapshot) => {
            const messagesDiv = document.getElementById("messages");
            messagesDiv.innerHTML = "";
            if (!snapshot.exists()) return;
            snapshot.forEach((child) => {
                const data = child.val();
                const isMine = data.name === currentUser;
                
                const row = document.createElement('div');
                row.className = `message-row ${isMine ? 'mine' : 'theirs'}`;
                
                const wrapper = document.createElement('div');
                wrapper.className = `msg-wrapper ${isMine ? 'mine' : 'theirs'}`;
                
                const bubble = document.createElement('div');
                bubble.className = `bubble ${isMine ? 'bubble-mine' : 'bubble-theirs'}`;
                bubble.onclick = () => startReply(data.text || "[Image]", data.name);

                if (data.replyTo) {
                    const quote = document.createElement('div');
                    quote.className = 'quote-box';
                    quote.innerText = `${data.replyTo.user}: ${data.replyTo.text.length > 20 ? data.replyTo.text.substring(0,20) + '...' : data.replyTo.text}`;
                    bubble.appendChild(quote);
                }

                if (data.image) {
                    const img = document.createElement('img');
                    img.src = data.image;
                    img.onmousedown = (e) => startHold(e, data.image);
                    img.onmouseup = endHold;
                    img.onmouseleave = endHold;
                    img.ontouchstart = (e) => startHold(e, data.image);
                    img.ontouchend = endHold;
                    bubble.appendChild(img);
                } else {
                    // Inject formatted links
                    bubble.innerHTML = formatMessageLinks(data.text);
                }
                
                const time = document.createElement('div');
                time.className = 'timestamp';
                time.innerText = formatTime(data.timestamp);

                wrapper.appendChild(bubble);
                wrapper.appendChild(time);
                row.appendChild(wrapper);
                messagesDiv.appendChild(row);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });

        onValue(galleryRef, (snapshot) => {
            const galleryDiv = document.getElementById("gallery");
            galleryDiv.innerHTML = "";
            if (!snapshot.exists()) return;
            snapshot.forEach((child) => {
                const data = child.val();
                const key = child.key;
                const item = document.createElement('div');
                item.className = 'gallery-item';
                
                const img = document.createElement('img');
                img.src = data.image;
                img.onclick = () => openLightbox(data.image);
                
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.innerText = '✕';
                delBtn.onclick = (e) => deleteGalleryItem(e, key);
                
                item.appendChild(img);
                item.appendChild(delBtn);
                galleryDiv.appendChild(item);
            });
        });

        if(currentUser === 'Reece') document.getElementById('userReece').checked = true; 
        else document.getElementById('userShanky').checked = true;
    </script>
</body>
</html>
