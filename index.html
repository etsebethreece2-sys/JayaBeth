<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JayaBeth - The Yap Box</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --box-base-rgb: 190, 160, 230; 
            --box-alpha: 0.85;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #b19cd9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #8a2be2; }

        body { 
            font-family: 'Fredoka', sans-serif; margin: 0; padding: 20px; min-height: 100vh; 
            background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)), #fff9fa url('lilacavo.jpg'); 
            background-size: 650px; animation: moveBackground 144s linear infinite; 
            display: flex; justify-content: center; align-items: center; perspective: 1000px; overflow: hidden;
        }
        @keyframes moveBackground { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        #app-wrapper { transition: transform 0.1s ease-out, box-shadow 0.3s ease; transform-style: preserve-3d; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.48); }
        .main-app-container { display: flex; gap: 20px; align-items: flex-start; max-width: 1300px; }

        .box-style { 
            background-color: rgba(var(--box-base-rgb), var(--box-alpha));
            background-image: radial-gradient(rgba(255, 255, 255, 0.3) 1px, transparent 1px);
            background-size: 20px 20px;
            backdrop-filter: blur(5px); border-radius: 25px; border: 1px solid #000; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.16), 0 0 80px rgba(0,0,0,0.08); padding: 15px; box-sizing: border-box; 
        }

        .left-column { display: flex; flex-direction: column; gap: 15px; }

        /* Calendar */
        .calendar-box { width: 140px; padding: 12px 10px; display: flex; flex-direction: column; gap: 8px; align-items: center; transition: all 0.3s ease; cursor: pointer; }
        .calendar-box.expanded { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1.2); 
            z-index: 9999; cursor: default; width: 350px; backdrop-filter: none; background: rgba(var(--box-base-rgb), 1);
        }
        .calendar-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:9990; backdrop-filter: blur(10px); }
        
        .calendar-header { display: flex; justify-content: space-between; align-items: center; width: 100%; font-weight: 600; font-size: 0.9em; color: #333; }
        .calendar-header button { background: none; border: none; cursor: pointer; color: #8a2be2; font-size: 12px; font-weight: bold; padding: 0 5px; transition: transform 0.2s; }
        .calendar-days { display: grid; grid-template-columns: repeat(7, 1fr); width: 100%; text-align: center; font-size: 10px; font-weight: bold; color: #666; }
        .calendar-dates { display: grid; grid-template-columns: repeat(7, 1fr); width: 100%; text-align: center; gap: 4px; }
        .calendar-date { font-size: 10px; height: 25px; width: 25px; line-height: 25px; border-radius: 50%; cursor: pointer; color: #333; position: relative; }
        .calendar-date.other-month { opacity: 0.3; }
        .calendar-date.today { background: #8a2be2; color: white; }
        .event-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); }

        /* Event UI */
        #eventPanel { display: none; margin-top: 15px; width: 100%; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 10px; }
        .calendar-box.expanded #eventPanel { display: block; }
        .event-input-row { display: flex; gap: 5px; margin-bottom: 10px; }
        .event-input-row input { flex: 1; padding: 5px; border-radius: 5px; border: 1px solid #ccc; }
        .event-list { max-height: 150px; overflow-y: auto; text-align: left; font-size: 12px; }
        .event-item { padding: 4px; margin-bottom: 3px; border-radius: 4px; background: rgba(0,0,0,0.05); display: flex; justify-content: space-between; }

        /* General UI */
        .date-box, .music-box, .heart-box, .side-container, .chat-container { /* existing styles maintained */ }
        .date-box { width: 140px; text-align: center; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .date-number { font-size: 2.8em; font-weight: 700; color: #8a2be2; line-height: 1; }
        .date-text { font-size: 0.9em; font-weight: 600; color: #333; }
        .music-box { width: 140px; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .custom-slider { -webkit-appearance: none; width: 100%; height: 6px; background: rgba(138, 43, 226, 0.3); border-radius: 3px; }
        .heart-box { width: 140px; display: flex; justify-content: center; align-items: center; padding: 10px; cursor: pointer; }
        .floating-heart { position: fixed; font-size: 30px; pointer-events: none; z-index: 99999; animation: floatAway 1s ease-out forwards; }
        @keyframes floatAway { 0% { opacity: 0; transform: translateY(0) scale(0); } 100% { opacity: 0; transform: translateY(-100px) scale(1.5); } }
        
        .side-container { width: 260px; height: 600px; display: flex; flex-direction: column; }
        .header-style { font-weight: bold; color: #333; margin-bottom: 10px; text-align: center; border-bottom: 2px solid rgba(255, 255, 255, 0.5); padding-bottom: 10px; }
        .chat-container { width: 400px; height: 600px; display: flex; flex-direction: column; position: relative; }
        
        /* Dark Mode */
        body.dark-mode { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), #121212 url('lilacavo.jpg'); color: #e0e0e0; }
        body.dark-mode .box-style { filter: brightness(0.6); border: 1px solid #444; }
    </style>
</head>

<body>
    <div id="calendarOverlay" class="calendar-overlay" onclick="closeCalendar()"></div>

    <div id="app-wrapper">
        <div class="main-app-container">
            <div class="left-column">
                <div class="date-box box-style">
                    <div class="date-text">It was official</div>
                    <div class="date-number" id="days-count">0</div>
                </div>

                <div class="calendar-box box-style" onclick="expandCalendar()">
                    <div class="calendar-header">
                        <button onclick="event.stopPropagation(); changeMonth(-1)">&#9664;</button>
                        <span id="monthYear"></span>
                        <button onclick="event.stopPropagation(); changeMonth(1)">&#9654;</button>
                    </div>
                    <div class="calendar-days"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>
                    <div class="calendar-dates" id="calendarDates"></div>
                    
                    <div id="eventPanel" onclick="event.stopPropagation()">
                        <div id="selectedDateText" style="font-size:12px; font-weight:bold; margin-bottom:5px;">Select a day</div>
                        <div class="event-input-row">
                            <input type="text" id="eventInput" placeholder="Add event...">
                            <select id="eventColor">
                                <option value="#8a2be2">Purple</option>
                                <option value="#ff6347">Red</option>
                                <option value="#32cd32">Green</option>
                                <option value="#1e90ff">Blue</option>
                                <option value="#ffd700">Gold</option>
                            </select>
                            <button onclick="addEvent()">+</button>
                        </div>
                        <div id="eventList" class="event-list"></div>
                    </div>
                </div>

                <div class="heart-box box-style" onclick="spawnHeart()">❤️</div>
            </div>

            <!-- Chat & Gallery Containers Omitted for brevity, but exist in logic -->
            <div class="side-container box-style"> <div class="header-style">Our Gallery</div><div id="gallery"></div></div>
            <div class="chat-container box-style"> <div class="messages" id="messages"></div> </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, child, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA6FYNW6L3sUd2Adiyp6M0hG_b1IrNuOEY", authDomain: "jayabeth-fdaad.firebaseapp.com", projectId: "jayabeth-fdaad", storageBucket: "jayabeth-fdaad.firebasestorage.app", messagingSenderId: "716510918759", appId: "1:716510918759:web:35340b83ad2a134cecbcc2" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app); 
        const eventsRef = ref(db, "events");

        let currentMonth = new Date().getMonth(); let currentYear = new Date().getFullYear();
        let selectedDate = null;
        let allEvents = {};

        // Sync Events
        onValue(eventsRef, (snapshot) => {
            allEvents = snapshot.val() || {};
            renderCalendar();
        });

        window.expandCalendar = () => {
            document.querySelector('.calendar-box').classList.add('expanded');
            document.getElementById('calendarOverlay').style.display = 'block';
        };
        window.closeCalendar = () => {
            document.querySelector('.calendar-box').classList.remove('expanded');
            document.getElementById('calendarOverlay').style.display = 'none';
        };

        window.renderCalendar = () => {
            const calendarDates = document.getElementById("calendarDates");
            document.getElementById("monthYear").innerText = `${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][currentMonth]} ${currentYear}`;
            calendarDates.innerHTML = "";
            const firstDay = new Date(currentYear, currentMonth, 1).getDay(); 
            const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();
            
            for (let i = 1; i <= totalDays; i++) {
                const dateKey = `${currentYear}-${currentMonth}-${i}`;
                const dateEl = document.createElement("div");
                dateEl.className = "calendar-date";
                dateEl.innerText = i;
                
                // Show Events
                if (allEvents[dateKey]) {
                    Object.values(allEvents[dateKey]).forEach(evt => {
                        const dot = document.createElement('span');
                        dot.className = 'event-dot';
                        dot.style.background = evt.color;
                        dateEl.appendChild(dot);
                    });
                }

                dateEl.onclick = (e) => { e.stopPropagation(); selectDate(i, dateKey); };
                calendarDates.appendChild(dateEl);
            }
        };

        window.selectDate = (day, key) => {
            selectedDate = key;
            document.getElementById("selectedDateText").innerText = `Events for ${day}/${currentMonth+1}/${currentYear}`;
            const list = document.getElementById("eventList");
            list.innerHTML = "";
            if (allEvents[key]) {
                Object.entries(allEvents[key]).forEach(([k, v]) => {
                    const item = document.createElement('div');
                    item.className = 'event-item';
                    item.style.borderLeft = `4px solid ${v.color}`;
                    item.innerHTML = `<span>${v.text}</span> <span style="cursor:pointer" onclick="deleteEvent('${key}', '${k}')">✕</span>`;
                    list.appendChild(item);
                });
            }
        };

        window.addEvent = () => {
            if (!selectedDate) return;
            const input = document.getElementById("eventInput");
            const color = document.getElementById("eventColor").value;
            if (!input.value) return;
            push(ref(db, `events/${selectedDate}`), { text: input.value, color: color });
            input.value = "";
        };

        window.deleteEvent = (dateKey, eventKey) => {
            remove(ref(db, `events/${dateKey}/${eventKey}`));
        };

        window.changeMonth = (dir) => {
            currentMonth += dir;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; } 
            else if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar();
        };

        window.spawnHeart = () => {
            const heart = document.createElement('div'); heart.innerText = '❤️'; heart.className = 'floating-heart';
            heart.style.left = `${Math.random() * window.innerWidth}px`; heart.style.top = `${Math.random() * window.innerHeight}px`;
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        };

        // Init
        renderCalendar();
    </script>
</body>
</html>
