<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JayaBeth - The Yap Box</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --box-base-rgb: 190, 160, 230;
            --box-alpha: 0.85;
        }

        body { 
            font-family: 'Fredoka', sans-serif; margin: 0; padding: 20px; min-height: 100vh; 
            background: #fff9fa url('avo2.jpg'); background-size: 650px; 
            animation: moveBackground 120s linear infinite; 
            display: flex; justify-content: center; align-items: center; 
            perspective: 1500px; overflow-x: hidden;
        }
        @keyframes moveBackground { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        .main-app-container { display: flex; gap: 25px; align-items: flex-start; max-width: 1300px; transform-style: preserve-3d; }

        /* Shared Box Style with 3D Tilt Support */
        .box-style { 
            background-color: rgba(var(--box-base-rgb), var(--box-alpha));
            background-image: radial-gradient(rgba(255, 255, 255, 0.3) 1px, transparent 1px);
            background-size: 20px 20px;
            backdrop-filter: blur(5px); 
            border-radius: 25px; border: 1px solid #000; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            padding: 15px; box-sizing: border-box; 
            transition: transform 0.1s ease-out; /* Smooth tracking */
            transform-style: preserve-3d;
            will-change: transform;
        }

        .side-container { width: 280px; height: 620px; display: flex; flex-direction: column; }
        .chat-container { width: 420px; height: 620px; display: flex; flex-direction: column; position: relative; }

        /* Headers */
        .header-style { font-weight: bold; color: #333; margin-bottom: 10px; text-align: center; border-bottom: 2px solid rgba(255, 255, 255, 0.5); padding-bottom: 10px; font-size: 1.2em; }

        /* Gallery Styles */
        #gallery { flex-grow: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; align-content: flex-start; }
        .gallery-item { position: relative; width: 100%; aspect-ratio: 1; border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.7); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; z-index: 5; font-size: 10px; }

        /* Bucket List Styles */
        .bucket-list { flex-grow: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
        .bucket-item { 
            background: rgba(255, 255, 255, 0.4); padding: 12px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center; font-size: 14px; 
            word-break: break-word; transform: translateZ(10px);
        }
        .delete-item-btn { background: none; border: none; color: #ff4d4d; cursor: pointer; font-size: 18px; font-weight: bold; }

        /* Chat Components */
        .btn-reset { position: absolute; top: 18px; left: 15px; background: none; border: none; color: #333; font-size: 10px; cursor: pointer; text-decoration: underline; z-index: 10; }
        .color-toggle { position: absolute; top: 12px; right: 15px; cursor: pointer; font-size: 22px; z-index: 10; transition: transform 0.2s; }
        .color-toggle:hover { transform: scale(1.2) rotate(15deg); }
        
        .color-menu { display: none; position: absolute; top: 45px; right: 15px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 20; width: 180px; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
        .color-option { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 1px solid #ccc; }
        
        .user-selector { display: flex; justify-content: center; background: rgba(255,255,255,0.4); border-radius: 20px; padding: 4px; width: 180px; margin: 8px auto 0 auto; }
        .user-selector input { display: none; }
        .user-selector label { padding: 5px 15px; cursor: pointer; font-size: 13px; border-radius: 16px; color: #555; transition: 0.2s; }
        .user-selector input:checked + label { background: #8a2be2; color: white; font-weight: bold; }

        .messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px; }
        .message-row { display: flex; width: 100%; }
        .message-row.mine { justify-content: flex-end; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; }
        .msg-wrapper.mine { align-items: flex-end; }
        
        .bubble { padding: 10px 14px; border-radius: 20px; font-size: 15px; position: relative; word-wrap: break-word; cursor: pointer; white-space: pre-wrap; transform: translateZ(5px); }
        .bubble-mine { background-color: #8a2be2; color: white; border-bottom-right-radius: 4px; }
        .bubble-theirs { background-color: #ffffff; color: #333; border-bottom-left-radius: 4px; }
        .bubble img { max-width: 100%; border-radius: 10px; display: block; }
        .bubble a { color: inherit; text-decoration: underline; font-weight: bold; }
        
        .timestamp { font-size: 10px; color: #444; margin: 2px 5px 0 5px; opacity: 0.7; }
        .quote-box { font-size: 0.75em; background: rgba(0,0,0,0.1); padding: 5px; border-radius: 8px; margin-bottom: 5px; border-left: 3px solid #888; opacity: 0.8; }
        .save-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); color: white; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 12px; font-weight: bold; z-index: 10; }

        .reply-bar { background: rgba(255,255,255,0.4); padding: 8px; border-radius: 15px; font-size: 12px; margin-bottom: 5px; display: none; }
        .chat-inputs { display: flex; gap: 8px; margin-top: 10px; }
        .chat-inputs input { flex-grow: 1; padding: 12px; border: none; border-radius: 25px; outline: none; font-family: 'Fredoka'; }
        .chat-inputs button { 
            padding: 0 15px; border: none; border-radius: 25px; 
            background: linear-gradient(135deg, #b19cd9, #8a2be2); color: white; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .chat-inputs button:hover { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
</head>

<body>
    <div id="lightbox" onclick="this.style.display='none'" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); z-index:9999; align-items:center; justify-content:center;">
        <img id="lightbox-img" style="max-width:90%; max-height:90%; border-radius:15px;" src="">
    </div>

    <div class="main-app-container">
        <!-- Gallery -->
        <div class="side-container box-style tilt-box">
            <div class="header-style">Image Gallery</div>
            <div id="gallery"></div>
        </div>

        <!-- Chat -->
        <div class="chat-container box-style tilt-box">
            <button onclick="resetChat()" class="btn-reset">Reset Chat</button>
            <div class="color-toggle" onclick="toggleColorMenu()">🎨</div>
            
            <div id="colorMenu" class="color-menu">
                <div class="color-grid">
                    <div class="color-option" style="background: rgb(190, 160, 230);" onclick="changeBaseColor('190, 160, 230')"></div>
                    <div class="color-option" style="background: rgb(255, 182, 193);" onclick="changeBaseColor('255, 182, 193')"></div>
                    <div class="color-option" style="background: rgb(173, 216, 230);" onclick="changeBaseColor('173, 216, 230')"></div>
                    <div class="color-option" style="background: rgb(144, 238, 144);" onclick="changeBaseColor('144, 238, 144')"></div>
                </div>
                <input type="range" min="0.2" max="1" step="0.1" id="opacitySlider" oninput="changeAlpha(this.value)">
            </div>

            <div class="header-style">
                The Yap Box
                <div class="user-selector">
                    <input type="radio" id="uS" name="uN" value="Shanky" onchange="changeUser(this)">
                    <label for="uS">Shanky</label>
                    <input type="radio" id="uR" name="uN" value="Reece" onchange="changeUser(this)">
                    <label for="uR">Reece</label>
                </div>
            </div>
            
            <div class="messages" id="messages"></div>
            
            <div id="replyBar" class="reply-bar"></div>
            <div class="chat-inputs">
                <input type="file" id="fI" accept="image/*" style="display:none;" onchange="handleImage(event)">
                <button onclick="document.getElementById('fI').click()">📷</button>
                <input type="text" id="mI" placeholder="Message..." onkeypress="if(event.key==='Enter')sendMsg()">
                <button onclick="sendMsg()">Send</button>
            </div>
        </div>

        <!-- Bucket List -->
        <div class="side-container box-style tilt-box">
            <div class="header-style">Bucket List</div>
            <ul id="bucketList" class="bucket-list"></ul>
            <div class="chat-inputs">
                <input type="text" id="bI" placeholder="Add..." onkeypress="if(event.key==='Enter')addBucket()">
                <button onclick="addBucket()">Add</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyA6FYNW6L3sUd2Adiyp6M0hG_b1IrNuOEY", 
            authDomain: "jayabeth-fdaad.firebaseapp.com", 
            projectId: "jayabeth-fdaad", 
            storageBucket: "jayabeth-fdaad.firebasestorage.app", 
            messagingSenderId: "716510918759", 
            appId: "1:716510918759:web:35340b83ad2a134cecbcc2" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const mRef = ref(db, "chatroom");
        const gRef = ref(db, "gallery");
        const bRef = ref(db, "bucketlist");
        
        let currentUser = localStorage.getItem('yapboxUser') || 'Shanky';
        let holdTimer, replyingTo = null;

        // --- GLOBAL 3D TILT ---
        window.addEventListener('mousemove', (e) => {
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const dx = (e.clientX - cx) / cx;
            const dy = (e.clientY - cy) / cy;
            const rotX = dy * -15; 
            const rotY = dx * 15;
            document.querySelectorAll('.tilt-box').forEach(box => {
                box.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
            });
        });

        // --- THEME ---
        window.changeBaseColor = (rgb) => { document.documentElement.style.setProperty('--box-base-rgb', rgb); localStorage.setItem('yapboxRGB', rgb); };
        window.changeAlpha = (v) => { document.documentElement.style.setProperty('--box-alpha', v); localStorage.setItem('yapboxAlpha', v); };
        window.toggleColorMenu = () => { const m = document.getElementById('colorMenu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; };

        // --- HELPERS ---
        const formatTime = (ts) => { const d = new Date(ts); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); };
        const formatLinks = (t) => t.replace(/(\b(https?):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig, '<a href="$1" target="_blank">$1</a>');

        // --- BUCKET LIST ---
        window.addBucket = () => { const i = document.getElementById('bI'); if(i.value) push(bRef, { text: i.value }); i.value = ""; };
        window.delBucket = (k) => remove(child(bRef, k));
        onValue(bRef, (s) => {
            const l = document.getElementById('bucketList'); l.innerHTML = "";
            s.forEach(c => {
                const li = document.createElement('li'); li.className='bucket-item';
                li.innerHTML = `<span>${c.val().text}</span><button class="delete-item-btn" onclick="delBucket('${c.key}')">✕</button>`;
                l.appendChild(li);
            });
        });

        // --- CHAT LOGIC ---
        window.startReply = (text, user) => {
            replyingTo = { text, user };
            const bar = document.getElementById('replyBar');
            bar.style.display = 'block';
            bar.innerHTML = `Replying to ${user}: ${text.substring(0,15)}... <span onclick="cancelReply()" style="float:right;cursor:pointer">✕</span>`;
        };
        window.cancelReply = () => { replyingTo = null; document.getElementById('replyBar').style.display = 'none'; };

        window.sendMsg = () => {
            const i = document.getElementById('mI');
            if(!i.value.trim()) return;
            push(mRef, { name: currentUser, text: i.value, timestamp: Date.now(), replyTo: replyingTo });
            i.value = ""; cancelReply();
        };

        window.handleImage = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const s = 400/img.width; canvas.width = 400; canvas.height = img.height*s;
                    canvas.getContext('2d').drawImage(img, 0,0,400,canvas.height);
                    push(mRef, { name: currentUser, image: canvas.toDataURL('image/jpeg', 0.6), timestamp: Date.now(), replyTo: replyingTo });
                    cancelReply();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        // Hold to save logic
        window.startHold = (e, img) => {
            holdTimer = setTimeout(() => {
                const target = e.target.parentElement;
                if(target.querySelector('.save-overlay')) return;
                const ov = document.createElement('div'); ov.className='save-overlay'; ov.innerText='Save to Gallery';
                ov.onclick = () => { push(gRef, { image: img }); ov.innerText='Saved!'; setTimeout(()=>ov.remove(),800); };
                target.appendChild(ov);
                setTimeout(()=> { if(ov) ov.remove(); }, 2500);
            }, 800);
        };
        window.endHold = () => clearTimeout(holdTimer);

        onValue(mRef, (s) => {
            const div = document.getElementById('messages'); div.innerHTML = "";
            s.forEach(c => {
                const v = c.val(); const mine = v.name === currentUser;
                const row = document.createElement('div'); row.className = `message-row ${mine?'mine':'theirs'}`;
                const wrap = document.createElement('div'); wrap.className = `msg-wrapper ${mine?'mine':'theirs'}`;
                const bub = document.createElement('div'); bub.className = `bubble ${mine?'bubble-mine':'bubble-theirs'}`;
                bub.onclick = () => startReply(v.text || "[Image]", v.name);
                
                if(v.replyTo) {
                    const q = document.createElement('div'); q.className='quote-box';
                    q.innerText = `${v.replyTo.user}: ${v.replyTo.text}`;
                    bub.appendChild(q);
                }
                if(v.image) {
                    const img = document.createElement('img'); img.src = v.image;
                    img.onmousedown = (e) => startHold(e, v.image); img.onmouseup = endHold;
                    img.ontouchstart = (e) => startHold(e, v.image); img.ontouchend = endHold;
                    bub.appendChild(img);
                } else {
                    bub.innerHTML += formatLinks(v.text);
                }
                const time = document.createElement('div'); time.className='timestamp'; time.innerText = formatTime(v.timestamp);
                wrap.appendChild(bub); wrap.appendChild(time); row.appendChild(wrap); div.appendChild(row);
            });
            div.scrollTop = div.scrollHeight;
        });

        // --- GALLERY ---
        window.delGal = (k) => remove(child(gRef, k));
        onValue(gRef, (s) => {
            const div = document.getElementById('gallery'); div.innerHTML = "";
            s.forEach(c => {
                const item = document.createElement('div'); item.className='gallery-item';
                const img = document.createElement('img'); img.src=c.val().image;
                img.onclick = () => { document.getElementById('lightbox-img').src=img.src; document.getElementById('lightbox').style.display='flex'; };
                const btn = document.createElement('button'); btn.className='delete-btn'; btn.innerText='✕';
                btn.onclick = (e) => { e.stopPropagation(); delGal(c.key); };
                item.appendChild(img); item.appendChild(btn); div.appendChild(item);
            });
        });

        window.changeUser = (r) => { localStorage.setItem('yapboxUser', r.value); location.reload(); };
        window.resetChat = () => { if(confirm("Clear Chat?")) remove(mRef); };

        // Initialize Theme & User
        changeBaseColor(localStorage.getItem('yapboxRGB') || '190, 160, 230');
        changeAlpha(localStorage.getItem('yapboxAlpha') || '0.85');
        document.getElementById('opacitySlider').value = localStorage.getItem('yapboxAlpha') || '0.85';
        if(currentUser === 'Reece') document.getElementById('uR').checked = true; else document.getElementById('uS').checked = true;
    </script>
</body>
</html>
