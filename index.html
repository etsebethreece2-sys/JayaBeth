<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url(''); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            margin: 0;
            padding: 0;
            height: 100vh;
            perspective: 1000px; 
            /* Removed flexbox properties here as we are using absolute positioning for everything */
        }

        /* Your existing Title Box */
        .container {
            position: absolute;
            top: 20px;
            left: 20px;
            text-align: center;
            background: rgba(255, 182, 193, 0.7); 
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.1s ease-out;
            cursor: pointer;
            user-select: none;
            transform-style: preserve-3d;
        }

        h1 { color: #333; margin-top: 0; }

        .glow-text {
            color: #666; 
            font-weight: bold;
            background: linear-gradient(90deg, #666 45%, #bbb 50%, #666 55%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 6s linear infinite;
        }

        @keyframes shine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* --- UPDATED CHATROOM UI --- */
        .chat-container {
            position: absolute;
            /* Centering the chatroom */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            
            /* Made larger and longer */
            width: 450px;
            height: 600px;
            
            background: rgba(255, 182, 193, 0.85); /* Matching pink theme */
            backdrop-filter: blur(5px);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
        }

        .chat-header {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            border-bottom: 2px solid rgba(0,0,0,0.1);
            padding-bottom: 5px;
            font-size: 1.2em; /* Slightly larger header text */
        }

        .messages {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 15px; /* slightly more space at bottom */
            display: flex;
            flex-direction: column;
            gap: 10px; /* slightly more space between messages */
            padding-right: 5px;
        }

        .message-box {
            background: rgba(255, 255, 255, 0.6);
            padding: 10px; /* slightly larger padding */
            border-radius: 8px;
            font-size: 15px; /* slightly larger text */
            color: #222;
        }

        .message-box strong {
            color: #e83e8c; /* Darker pink for names */
        }

        .chat-inputs {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-inputs input {
            padding: 10px;
            border: none;
            border-radius: 5px;
            outline: none;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }

        .chat-inputs button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #e83e8c;
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-inputs button:hover {
            background-color: #d82b78;
        }
    </style>
</head>

<body>

    <!-- Your existing box -->
    <div class="container" id="tilt-box">
        <h1>JayaBeth</h1>
        <p class="glow-text">Shanky and Reece est. 2024</p>
    </div>

    <!-- The Chatroom UI -->
    <div class="chat-container">
        <div class="chat-header">Live Chatroom</div>
        <div class="messages" id="messages">
            <!-- Messages will load here -->
        </div>
        <div class="chat-inputs">
            <input type="text" id="usernameInput" placeholder="Your Name" maxlength="15">
            <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <!-- Your Tilt Script -->
    <script>
        const container = document.getElementById('tilt-box');
        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            container.style.transform = `rotateX(${-y / 10}deg) rotateY(${x / 10}deg)`;
        });
        container.addEventListener('mouseleave', () => {
            container.style.transform = 'rotateX(0deg) rotateY(0deg)';
        });
    </script>

    <!-- Firebase Script (Module setup) -->
    <script type="module">
        // Import Firebase functions
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Fixed syntax formatting here so JS doesn't break
        const firebaseConfig = { 
            apiKey: "AIzaSyA6FYNW6L3sUd2Adiyp6M0hG_b1IrNuOEY", 
            authDomain: "jayabeth-fdaad.firebaseapp.com", 
            projectId: "jayabeth-fdaad", 
            storageBucket: "jayabeth-fdaad.firebasestorage.app", 
            messagingSenderId: "716510918759", 
            appId: "1:716510918759:web:35340b83ad2a134cecbcc2", 
            measurementId: "G-6C4G5SNN73" 
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, "chatroom");

        // Function to send message to database
        window.sendMessage = function() {
            const username = document.getElementById("usernameInput").value;
            const message = document.getElementById("messageInput").value;

            if (username.trim() === "" || message.trim() === "") {
                alert("Please enter a name and a message!");
                return;
            }

            // Push to Firebase
            push(messagesRef, {
                name: username,
                text: message,
                timestamp: Date.now()
            });

            // Clear message input
            document.getElementById("messageInput").value = "";
        };

        // Allow sending with 'Enter' key
        window.handleKeyPress = function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        };

        // Listen for new messages from the database and display them
        onChildAdded(messagesRef, (snapshot) => {
            const data = snapshot.val();
            const messagesDiv = document.getElementById("messages");
            
            const messageElement = document.createElement("div");
            messageElement.classList.add("message-box");
            messageElement.innerHTML = `<strong>${data.name}:</strong> ${data.text}`;
            
            messagesDiv.appendChild(messageElement);
            
            // Auto-scroll to bottom
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
    </script>

</body>
</html>
