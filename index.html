<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JayaBeth - The Yap Box</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --box-base-rgb: 190, 160, 230; /* Default Lilac */
            --box-alpha: 0.85;
        }

        body { 
            font-family: 'Fredoka', sans-serif; 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh; 
            background: #fff9fa url('avo2.jpg'); 
            background-size: 650px; 
            animation: moveBackground 120s linear infinite; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            perspective: 1200px; /* Needed for 3D effects */
        }
        
        @keyframes moveBackground { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        .main-app-container { display: flex; gap: 20px; align-items: flex-start; max-width: 1200px; }

        /* Shared Box Style with 3D transition */
        .box-style { 
            background-color: rgba(var(--box-base-rgb), var(--box-alpha));
            background-image: radial-gradient(rgba(255, 255, 255, 0.3) 1px, transparent 1px);
            background-size: 20px 20px;
            backdrop-filter: blur(5px); 
            border-radius: 25px; 
            border: 1px solid #000; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1), 0 0 80px rgba(0,0,0,0.05); 
            padding: 15px; 
            box-sizing: border-box; 
            transition: transform 0.1s ease-out; /* Smooth tilt movement */
            transform-style: preserve-3d;
            will-change: transform;
        }

        /* Side Containers */
        .side-container { width: 260px; height: 600px; display: flex; flex-direction: column; }
        .header-style { font-weight: bold; color: #333; margin-bottom: 10px; text-align: center; border-bottom: 2px solid rgba(255, 255, 255, 0.5); padding-bottom: 10px; font-size: 1.1em; }

        /* Gallery */
        #gallery { flex-grow: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; align-content: flex-start; padding-right: 5px; }
        .gallery-item { position: relative; width: 100%; aspect-ratio: 1; border-radius: 10px; overflow: hidden; cursor: pointer; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.7); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; z-index: 2; font-size: 10px; }

        /* Bucket List - Hover highlight removed as requested */
        .bucket-list { flex-grow: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
        .bucket-item { 
            background: rgba(255, 255, 255, 0.4); 
            padding: 10px 12px; 
            border-radius: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 14px; 
            word-break: break-word;
        }
        .delete-item-btn { background: none; border: none; color: #ff4d4d; cursor: pointer; font-weight: bold; padding: 0 5px; font-size: 16px; opacity: 0.7; transition: 0.2s; }
        .delete-item-btn:hover { opacity: 1; transform: scale(1.2); }

        /* Chat Container */
        .chat-container { width: 400px; height: 600px; display: flex; flex-direction: column; position: relative; }
        .btn-reset { position: absolute; top: 20px; left: 20px; background: none; border: none; color: #333; font-size: 11px; cursor: pointer; text-decoration: underline; }
        
        .color-toggle { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 20px; z-index: 10; transition: transform 0.3s ease; }
        .color-toggle:hover { transform: scale(1.3) rotate(20deg); }

        .color-menu { display: none; position: absolute; top: 45px; right: 15px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 20; width: 180px; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .color-option { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 1px solid #ccc; transition: transform 0.1s; }
        .color-option:hover { transform: scale(1.1); }
        input[type=range] { width: 100%; }

        .chat-header { font-weight: bold; color: #333; margin-bottom: 15px; text-align: center; padding-bottom: 10px; font-size: 1.3em; border-bottom: 2px solid rgba(255, 255, 255, 0.5); }
        .user-selector { display: flex; justify-content: center; background: rgba(255,255,255,0.4); border-radius: 20px; padding: 4px; width: 180px; margin: 8px auto 0 auto; }
        .user-selector input { display: none; }
        .user-selector label { padding: 5px 15px; cursor: pointer; font-size: 13px; border-radius: 16px; color: #555; flex: 1; text-align: center; transition: 0.2s; }
        .user-selector input:checked + label { background: #8a2be2; color: white; font-weight: bold; }
        
        .messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px; }
        .message-row { display: flex; width: 100%; }
        .message-row.mine { justify-content: flex-end; }
        .message-row.theirs { justify-content: flex-start; }
        
        .msg-wrapper { display: flex; flex-direction: column; max-width: 75%; }
        .bubble { padding: 10px 14px; border-radius: 20px; font-size: 15px; position: relative; word-wrap: break-word; cursor: pointer; white-space: pre-wrap; }
        .bubble-mine { background-color: #8a2be2; color: white; border-bottom-right-radius: 4px; }
        .bubble-theirs { background-color: #ffffff; color: #333; border-bottom-left-radius: 4px; }
        .bubble img { max-width: 200px; display: block; border-radius: 10px; }
        
        .reply-bar { background: rgba(255,255,255,0.4); padding: 8px; border-radius: 15px; font-size: 12px; margin-bottom: 5px; display: none; }

        .chat-inputs { display: flex; flex-direction: row; gap: 8px; margin-top: 10px; }
        .chat-inputs input { flex-grow: 1; padding: 12px 15px; border: none; border-radius: 25px; outline: none; font-family: 'Fredoka', sans-serif; }
        .chat-inputs button { 
            padding: 0 15px; 
            border: none; 
            border-radius: 25px; 
            background: linear-gradient(135deg, #b19cd9, #8a2be2); 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 4px 10px rgba(138, 43, 226, 0.4); 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .chat-inputs button:hover {
            transform: translateY(-3px) translateZ(10px); /* Lift button on hover */
            box-shadow: 0 8px 18px rgba(138, 43, 226, 0.5);
            filter: brightness(1.1);
        }
    </style>
</head>

<body>
    <div id="lightbox" onclick="closeLightbox()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); z-index:9999; align-items:center; justify-content:center;">
        <img id="lightbox-img" style="max-width:90%; max-height:90%; border-radius:15px;" src="">
    </div>

    <div class="main-app-container">
        <!-- Gallery -->
        <div class="side-container box-style tilt-box">
            <div class="header-style">Image Gallery</div>
            <div id="gallery"></div>
        </div>

        <!-- Chat -->
        <div class="chat-container box-style tilt-box">
            <button onclick="resetChat()" class="btn-reset">Reset Chat</button>
            <div class="color-toggle" onclick="toggleColorMenu()">🎨</div>
            <div id="colorMenu" class="color-menu">
                <div class="color-grid">
                    <div class="color-option" style="background: rgb(190, 160, 230);" onclick="changeBaseColor('190, 160, 230')"></div>
                    <div class="color-option" style="background: rgb(255, 182, 193);" onclick="changeBaseColor('255, 182, 193')"></div>
                    <div class="color-option" style="background: rgb(173, 216, 230);" onclick="changeBaseColor('173, 216, 230')"></div>
                    <div class="color-option" style="background: rgb(144, 238, 144);" onclick="changeBaseColor('144, 238, 144')"></div>
                    <div class="color-option" style="background: rgb(255, 165, 0);" onclick="changeBaseColor('255, 165, 0')"></div>
                    <div class="color-option" style="background: rgb(255, 99, 71);" onclick="changeBaseColor('255, 99, 71')"></div>
                    <div class="color-option" style="background: rgb(255, 255, 0);" onclick="changeBaseColor('255, 255, 0')"></div>
                </div>
                <input type="range" min="0.2" max="1" step="0.1" id="opacitySlider" oninput="changeAlpha(this.value)">
            </div>

            <div class="chat-header">
                The Yap Box
                <div class="user-selector">
                    <input type="radio" id="userShanky" name="userName" value="Shanky" onchange="changeUser(this)">
                    <label for="userShanky">Shanky</label>
                    <input type="radio" id="userReece" name="userName" value="Reece" onchange="changeUser(this)">
                    <label for="userReece">Reece</label>
                </div>
            </div>
            
            <div class="messages" id="messages"></div>
            
            <div id="replyBar" class="reply-bar"></div>
            <div class="chat-inputs">
                <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleImageUpload(event)">
                <button onclick="document.getElementById('fileInput').click()">📷</button>
                <input type="text" id="messageInput" placeholder="Message..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

        <!-- Bucket List -->
        <div class="side-container box-style tilt-box">
            <div class="header-style">Bucket List</div>
            <ul id="bucketList" class="bucket-list"></ul>
            <div class="chat-inputs">
                <input type="text" id="bucketInput" placeholder="Add..." onkeypress="handleBucketKeyPress(event)">
                <button onclick="addBucketItem()">Add</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyA6FYNW6L3sUd2Adiyp6M0hG_b1IrNuOEY", 
            authDomain: "jayabeth-fdaad.firebaseapp.com", 
            projectId: "jayabeth-fdaad", 
            storageBucket: "jayabeth-fdaad.firebasestorage.app", 
            messagingSenderId: "716510918759", 
            appId: "1:716510918759:web:35340b83ad2a134cecbcc2" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, "chatroom");
        const galleryRef = ref(db, "gallery");
        const bucketListRef = ref(db, "bucketlist");
        
        let currentUser = localStorage.getItem('yapboxUser') || 'Shanky';

        // --- 3D TILT EFFECT LOGIC ---
        document.querySelectorAll('.tilt-box').forEach(box => {
            box.addEventListener('mousemove', (e) => {
                const rect = box.getBoundingClientRect();
                const x = e.clientX - rect.left; // x position within element
                const y = e.clientY - rect.top;  // y position within element
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                // Calculate rotation (max 10 degrees)
                const rotateX = ((y - centerY) / centerY) * -10;
                const rotateY = ((x - centerX) / centerX) * 10;
                
                box.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });
            
            box.addEventListener('mouseleave', () => {
                box.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
            });
        });

        // --- Theme Management ---
        const savedRGB = localStorage.getItem('yapboxRGB') || '190, 160, 230';
        const savedAlpha = localStorage.getItem('yapboxAlpha') || '0.85';
        document.documentElement.style.setProperty('--box-base-rgb', savedRGB);
        document.documentElement.style.setProperty('--box-alpha', savedAlpha);
        document.getElementById('opacitySlider').value = savedAlpha;

        window.toggleColorMenu = () => {
            const menu = document.getElementById('colorMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        };

        window.changeBaseColor = (rgb) => {
            document.documentElement.style.setProperty('--box-base-rgb', rgb);
            localStorage.setItem('yapboxRGB', rgb);
        };

        window.changeAlpha = (val) => {
            document.documentElement.style.setProperty('--box-alpha', val);
            localStorage.setItem('yapboxAlpha', val);
        };

        // --- Bucket List Logic ---
        window.addBucketItem = () => {
            const input = document.getElementById("bucketInput");
            if (input.value.trim() === "") return;
            push(bucketListRef, { text: input.value, timestamp: Date.now() });
            input.value = "";
        };
        window.handleBucketKeyPress = (e) => { if (e.key === 'Enter') addBucketItem(); };
        window.deleteBucketItem = (key) => { remove(child(bucketListRef, key)); };

        onValue(bucketListRef, (snapshot) => {
            const listDiv = document.getElementById("bucketList");
            listDiv.innerHTML = "";
            snapshot.forEach((child) => {
                const data = child.val();
                const key = child.key;
                const li = document.createElement('li');
                li.className = 'bucket-item';
                li.innerHTML = `<span>${data.text}</span><button class="delete-item-btn" onclick="deleteBucketItem('${key}')">✕</button>`;
                listDiv.appendChild(li);
            });
        });

        // --- Chat & Gallery Logic ---
        window.openLightbox = (src) => { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').style.display = 'flex'; };
        window.closeLightbox = () => { document.getElementById('lightbox').style.display = 'none'; };

        window.handleImageUpload = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const scale = 400 / img.width;
                    canvas.width = 400; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    push(messagesRef, { name: currentUser, image: canvas.toDataURL('image/jpeg', 0.5), timestamp: Date.now() });
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        window.sendMessage = () => {
            const input = document.getElementById("messageInput");
            if (input.value.trim() === "") return;
            push(messagesRef, { name: currentUser, text: input.value, timestamp: Date.now() });
            input.value = "";
        };

        window.changeUser = (r) => { localStorage.setItem('yapboxUser', r.value); location.reload(); };
        window.handleKeyPress = (e) => { if (e.key === 'Enter') sendMessage(); };
        window.resetChat = () => { if (confirm("Clear Chat?")) remove(messagesRef); };

        onValue(messagesRef, (snapshot) => {
            const messagesDiv = document.getElementById("messages");
            messagesDiv.innerHTML = "";
            snapshot.forEach((child) => {
                const data = child.val();
                const isMine = data.name === currentUser;
                const row = document.createElement('div');
                row.className = `message-row ${isMine ? 'mine' : 'theirs'}`;
                const bubble = document.createElement('div');
                bubble.className = `bubble ${isMine ? 'bubble-mine' : 'bubble-theirs'}`;
                if (data.image) {
                    const img = document.createElement('img'); img.src = data.image;
                    bubble.appendChild(img);
                } else {
                    bubble.innerText = data.text;
                }
                row.appendChild(bubble);
                messagesDiv.appendChild(row);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });

        onValue(galleryRef, (snapshot) => {
            const galleryDiv = document.getElementById("gallery");
            galleryDiv.innerHTML = "";
            snapshot.forEach((child) => {
                const data = child.val();
                const item = document.createElement('div');
                item.className = 'gallery-item';
                const img = document.createElement('img');
                img.src = data.image; img.onclick = () => openLightbox(data.image);
                item.appendChild(img);
                galleryDiv.appendChild(item);
            });
        });

        if(currentUser === 'Reece') document.getElementById('userReece').checked = true; 
        else document.getElementById('userShanky').checked = true;
    </script>
</body>
</html>
