                return;
            }

            const reader = new FileReader();

            reader.onload = (event) => {
                pushMediaMessage({
                    fileData: event.target.result,
                    mediaType: 'file',
                    mimeType: file.type || 'application/octet-stream',
                    fileName: file.name || 'download',
                    fileSize: file.size || 0
                });
            };

            reader.onerror = () => alert('Could not read that file.');
            reader.readAsDataURL(file);
        };

        const sendMediaFileToChat = (file) => {
            if (!file) return;

            if (file.type && file.type.startsWith('image/')) {
                sendImageFileToChat(file);
                return;
            }

            if (file.type && file.type.startsWith('video/')) {
                sendVideoFileToChat(file);
                return;
            }

            sendGenericFileToChat(file);
        };

        window.handleMediaUpload = (e) => {
            const file = e.target.files[0];
            sendMediaFileToChat(file);
            e.target.value = '';
        };

        let selfieStream = null;

        const stopSelfieStream = () => {
            if (!selfieStream) return;
            selfieStream.getTracks().forEach(track => track.stop());
            selfieStream = null;
        };

        const setSelfieStatus = (message) => {
            const status = document.getElementById('selfieStatus');
            if (status) status.innerText = message;
        };

        window.openSelfieCamera = async () => {
            const modal = document.getElementById('selfieModal');
            const video = document.getElementById('selfieVideo');

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                document.getElementById('selfieInput')?.click();
                return;
            }

            try {
                setSelfieStatus('Opening camera...');
                modal.classList.add('open');

                selfieStream = await navigator.mediaDevices.getUserMedia({
                    audio: false,
                    video: {
                        facingMode: 'user',
                        width: { ideal: 4096 },
                        height: { ideal: 4096 }
                    }
                });

                video.srcObject = selfieStream;
                await video.play();
                setSelfieStatus('Ready when you are 💜');
            } catch (error) {
                closeSelfieCamera();
                document.getElementById('selfieInput')?.click();
            }
        };

        window.closeSelfieCamera = () => {
            stopSelfieStream();
            const modal = document.getElementById('selfieModal');
            const video = document.getElementById('selfieVideo');
            if (video) video.srcObject = null;
            if (modal) modal.classList.remove('open');
        };

        window.captureSelfie = async () => {
            const video = document.getElementById('selfieVideo');

            if (!video || !video.videoWidth || !video.videoHeight) {
                alert('Camera is not ready yet.');
                return;
            }

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const image = canvas.toDataURL('image/png');
            const thumbnail = await createImageThumbnail(image);

            pushMediaMessage({
                image,
                thumbnail,
                mediaType: 'image',
                mimeType: 'image/png',
                fileName: `selfie-${new Date().toISOString().replace(/[:.]/g, '-')}.png`,
                originalQuality: true
            });

            closeSelfieCamera();
        };

        window.handleSelfieUpload = (e) => {
            const file = e.target.files[0];
            sendImageFileToChat(file);
            e.target.value = '';
        };


        window.handleImageUpload = window.handleMediaUpload;

        window.handlePasteImage = (event) => {
            const items = event.clipboardData ? Array.from(event.clipboardData.items || []) : [];
            const mediaItem = items.find(item => item.kind === 'file');

            if (!mediaItem) return;

            const file = mediaItem.getAsFile();
            if (!file) return;

            event.preventDefault();
            sendMediaFileToChat(file);
        };

        document.addEventListener('paste', window.handlePasteImage);

        const chatContainerForDrop = document.querySelector('.chat-container');

        if (chatContainerForDrop) {
            chatContainerForDrop.addEventListener('dragover', (event) => {
                const hasFiles = event.dataTransfer && Array.from(event.dataTransfer.types || []).includes('Files');
                if (!hasFiles) return;
                event.preventDefault();
            });

            chatContainerForDrop.addEventListener('drop', (event) => {
                const file = event.dataTransfer && event.dataTransfer.files ? event.dataTransfer.files[0] : null;
                if (!file) return;

                event.preventDefault();
                sendMediaFileToChat(file);
            });
        }

        window.sendSticker = (stickerSrc) => {
            stopTypingForCurrentUser();

            push(messagesRef, {
                name: currentUser,
                image: stickerSrc,
                isSticker: true,
                timestamp: Date.now(),
                replyTo: replyingTo,
                animationId: `${Date.now()}-${Math.random()}`
            });

            cancelReply();
            updateMyStatus();
            enforceMessageLimit();
            closeStickerMenu();
        };

        window.sendMessage = async () => {
            const input = document.getElementById("messageInput");
            const text = input.value.trim();

            if (text === "") return;

            const replySnapshot = replyingTo ? { ...replyingTo } : null;
            const animationId = `${Date.now()}-${Math.random()}`;

            stopTypingForCurrentUser();
            pendingLocalAnimationIds.add(animationId);

            input.value = "";
            toggleClearBtn();
            cancelReply();
            updateMyStatus();

            await animateOutgoingTextMessage(text);

            push(messagesRef, {
                name: currentUser,
                text,
                timestamp: Date.now(),
                replyTo: replySnapshot,
                animationId
            }).catch((error) => {
                pendingLocalAnimationIds.delete(animationId);
                input.value = text;
                toggleClearBtn();
                alert(`Could not send message: ${error.message}`);
            });

            enforceMessageLimit();
        };

        window.changeUser = (radio) => {
            localStorage.setItem('yapboxUser', radio.value);
            location.reload();
        };

        window.handleKeyPress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };

        window.resetChat = () => {
            if (confirm("Clear Chat?")) {
                const msgs = document.getElementById('messages');

                msgs.classList.add('wiping');

                setTimeout(() => {
                    remove(messagesRef);
                    msgs.classList.remove('wiping');
                    renderedMessageKeys.clear();
                    knownMessageKeys.clear();
                    firstMessageRenderDone = false;
                }, 400);
            }
        };

        window.deleteGalleryItem = (event, key) => {
            event.stopPropagation();
            remove(child(galleryRef, key));
        };

        onValue(messagesRef, (snapshot) => {
            const messagesDiv = document.getElementById("messages");
            const previousScrollTop = messagesDiv.scrollTop;
            const previousScrollBottom = messagesDiv.scrollHeight - messagesDiv.scrollTop - messagesDiv.clientHeight;
            const wasNearBottom = !firstMessageRenderDone || previousScrollBottom < 90;
            let shouldAutoScroll = !firstMessageRenderDone;

            messagesDiv.innerHTML = "";

            const currentKeysThisRender = new Set();

            if (!snapshot.exists()) {
                firstMessageRenderDone = true;
                return;
            }

            snapshot.forEach((childNode) => {
                const data = childNode.val();
                const key = childNode.key;
                const isMine = data.name === currentUser;
                const isSticker = data.isSticker || isStickerImage(data.image);

                currentKeysThisRender.add(key);

                const row = document.createElement('div');
                row.className = `message-row ${isMine ? 'mine' : 'theirs'}`;
                row.dataset.messageKey = key;

                const shouldAnimateMessage = firstMessageRenderDone && !knownMessageKeys.has(key);

                if (shouldAnimateMessage) {
                    if (isMine && data.animationId && pendingLocalAnimationIds.has(data.animationId)) {
                        row.classList.add('message-landed');
                        pendingLocalAnimationIds.delete(data.animationId);
                        shouldAutoScroll = true;
                    } else {
                        row.classList.add('message-animate');
                        if (wasNearBottom) shouldAutoScroll = true;
                    }
                }

                const wrapper = document.createElement('div');
                wrapper.className = `msg-wrapper ${isMine ? 'mine' : 'theirs'}`;

                const bubble = document.createElement('div');
                bubble.className = `bubble ${isMine ? 'bubble-mine' : 'bubble-theirs'} ${isSticker ? 'sticker-bubble' : ''}`;

                bubble.onclick = (e) => {
                    const interactiveMedia = ['IMG', 'VIDEO', 'A', 'BUTTON'].includes(e.target.tagName) || e.target.closest('.file-attachment-card') || e.target.closest('.quote-box');

                    if (!interactiveMedia && !e.target.closest('.msg-dropdown-container')) {
                        startReply(data, key);
                    }
                };

                if (isMine) {
                    const dropdownContainer = document.createElement('div');
                    dropdownContainer.className = 'msg-dropdown-container';

                    const dropBtn = document.createElement('button');
                    dropBtn.className = 'msg-dropdown-btn';
                    dropBtn.innerHTML = '&#8964;';

                    const dropMenu = document.createElement('div');
                    dropMenu.className = 'msg-dropdown-menu';

                    const pinBtn = document.createElement('button');
                    pinBtn.innerText = '📌 Pin';

                    pinBtn.onclick = (e) => {
                        e.stopPropagation();
                        pinMessage(data);
                        closeMessageDropdown(dropMenu);
                    };

                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'delete-msg-btn';
                    deleteBtn.innerText = '🗑️ Delete';

                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteMessage(key, row);
                        closeMessageDropdown(dropMenu);
                    };

                    dropMenu.appendChild(pinBtn);
                    dropMenu.appendChild(deleteBtn);

                    dropBtn.onclick = (e) => {
                        e.stopPropagation();

                        const isOpen = dropMenu.classList.contains('dropdown-open');

                        if (isOpen) {
                            closeMessageDropdown(dropMenu);
                        } else {
                            openMessageDropdown(dropMenu);
                        }
                    };

                    dropdownContainer.appendChild(dropBtn);
                    dropdownContainer.appendChild(dropMenu);
                    bubble.appendChild(dropdownContainer);
                }

                if (data.replyTo) {
                    const quote = document.createElement('div');
                    quote.className = 'quote-box';
                    quote.tabIndex = 0;
                    quote.title = data.replyTo.messageKey ? 'Jump to replied message' : 'Original message link unavailable';

                    quote.innerText = `${data.replyTo.user}: ${shortenPreviewText(data.replyTo.text)}`;
                    quote.onclick = (event) => {
                        event.stopPropagation();
                        jumpToMessage(data.replyTo.messageKey);
                    };
                    quote.onkeydown = (event) => {
                        if (event.key === 'Enter' || event.key === ' ') {
                            event.preventDefault();
                            jumpToMessage(data.replyTo.messageKey);
                        }
                    };

                    bubble.appendChild(quote);
                }

                if (data.image) {
                    if (!isSticker) {
                        if (data.thumbnail) {
                            const img = document.createElement('img');
                            img.loading = 'lazy';
                            img.decoding = 'async';
                            img.src = data.thumbnail;
                            img.alt = data.fileName || 'Image thumbnail';

                            img.onmousedown = (e) => startHold(e, data.image);
                            img.onmouseup = endHold;
                            img.onmouseleave = endHold;
                            img.ontouchstart = (e) => startHold(e, data.image);
                            img.ontouchend = endHold;

                            img.onclick = (e) => {
                                e.stopPropagation();
                                openLightbox(data.image);
                            };

                            bubble.appendChild(img);
                        } else {
                            const placeholder = document.createElement('button');
                            placeholder.type = 'button';
                            placeholder.className = 'image-placeholder';
                            placeholder.innerText = 'Open image';
                            placeholder.onclick = (e) => {
                                e.stopPropagation();
                                openLightbox(data.image);
                            };

                            bubble.appendChild(placeholder);
                        }
                    } else {
                        const img = document.createElement('img');
                        img.loading = 'lazy';
                        img.decoding = 'async';
                        img.src = data.image;
                        img.alt = 'Sticker';
                        img.onclick = (e) => e.stopPropagation();
                        bubble.appendChild(img);
                    }

                } else if (data.video) {
                    const video = document.createElement('video');
                    video.src = data.video;
                    video.controls = true;
                    video.playsInline = true;
                    video.preload = 'metadata';

                    video.onclick = (e) => e.stopPropagation();
                    video.onmousedown = (e) => e.stopPropagation();
                    video.ontouchstart = (e) => e.stopPropagation();

                    bubble.appendChild(video);

                    if (data.fileName) {
                        const fileName = document.createElement('div');
                        fileName.className = 'video-file-name';
                        fileName.innerText = data.fileName;
                        bubble.appendChild(fileName);
                    }
                } else if (data.fileData) {
                    const fileCard = document.createElement('div');
                    fileCard.className = 'file-attachment-card';
                    fileCard.onclick = (e) => e.stopPropagation();

                    const fileIcon = document.createElement('div');
                    fileIcon.className = 'file-attachment-icon';
                    fileIcon.innerText = getFileEmoji(data.fileName, data.mimeType);

                    const fileInfo = document.createElement('div');
                    fileInfo.className = 'file-attachment-info';

                    const fileName = document.createElement('div');
                    fileName.className = 'file-attachment-name';
                    fileName.innerText = data.fileName || 'download';

                    const fileMeta = document.createElement('div');
                    fileMeta.className = 'file-attachment-meta';
                    fileMeta.innerText = formatFileSize(data.fileSize || 0);

                    const downloadLink = document.createElement('a');
                    downloadLink.className = 'file-download-btn';
                    downloadLink.href = data.fileData;
                    downloadLink.download = data.fileName || 'download';
                    downloadLink.innerText = '⬇ Save file';
                    downloadLink.onclick = (e) => e.stopPropagation();

                    fileInfo.appendChild(fileName);
                    fileInfo.appendChild(fileMeta);
                    fileInfo.appendChild(downloadLink);

                    fileCard.appendChild(fileIcon);
                    fileCard.appendChild(fileInfo);
                    bubble.appendChild(fileCard);
                } else {
                    const textSpan = document.createElement('span');
                    textSpan.innerHTML = formatMessageLinks(data.text || '');
                    bubble.appendChild(textSpan);
                }

                const time = document.createElement('div');
                time.className = 'timestamp';
                time.innerText = formatTime(data.timestamp);

                if (isMine) {
                    const tickSpan = document.createElement('span');

                    tickSpan.className = 'tick ' + (data.timestamp <= otherUserLastSeen ? 'read' : 'unread');
                    tickSpan.setAttribute('data-timestamp', data.timestamp);
                    tickSpan.innerText = '✓✓';

                    time.appendChild(tickSpan);
                }

                wrapper.appendChild(bubble);
                wrapper.appendChild(time);

                row.appendChild(wrapper);
                messagesDiv.appendChild(row);
            });

            currentKeysThisRender.forEach(key => knownMessageKeys.add(key));

            requestAnimationFrame(() => {
                if (shouldAutoScroll) {
                    messagesDiv.scrollTo({
                        top: messagesDiv.scrollHeight,
                        behavior: firstMessageRenderDone ? 'smooth' : 'auto'
                    });
                } else {
                    messagesDiv.scrollTop = previousScrollTop;
                }
            });

            firstMessageRenderDone = true;
        });

        onValue(galleryRef, (snapshot) => {
            const galleryDiv = document.getElementById("gallery");

            galleryDiv.innerHTML = "";
            galleryImages = [];
            galleryImageKeys = [];

            if (!snapshot.exists()) return;

            snapshot.forEach((childNode) => {
                const data = childNode.val();
                const key = childNode.key;

                galleryImages.push(data.image);
                galleryImageKeys.push(key);

                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.onclick = () => openLightbox(data.image);

                if (data.thumbnail) {
                    const img = document.createElement('img');
                    img.loading = 'lazy';
                    img.decoding = 'async';
                    img.src = data.thumbnail;
                    img.alt = 'Gallery thumbnail';
                    item.appendChild(img);
                } else {
                    const placeholder = document.createElement('div');
                    placeholder.className = 'image-placeholder';
                    placeholder.innerText = 'Open image';
                    item.appendChild(placeholder);
                }

                galleryDiv.appendChild(item);
            });
        });

        if (currentUser === 'Reece') {
            document.getElementById('userReece').checked = true;
        } else {
            document.getElementById('userShanky').checked = true;
        }

        const wrapper = document.getElementById('app-wrapper');

        window.addEventListener('mousemove', (e) => {

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            const x = (e.clientX - centerX) / 80;
            const y = (e.clientY - centerY) / 80;

            wrapper.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
            wrapper.style.boxShadow = `${-x}px ${y + 20}px 50px rgba(0,0,0,0.48)`;
        });
    </script>
</body>
</html>
