<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e3c3cd; 
            margin: 0;
            padding: 0;
            height: 100vh;
            perspective: 1000px; 
            display: flex; /* Centering for better demo */
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: rgba(255, 182, 193, 0.7); 
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.1s ease-out;
            cursor: pointer;
            user-select: none;
            /* Keeps the content strictly inside the box */
            transform-style: preserve-3d;
        }

        h1 { color: #333; margin-top: 0; }

        /* The Glow Effect Styling */
        .glow-text {
            /* Fallback color */
            color: #666; 
            font-weight: bold;
            
            /* Gradient that moves: Dark Grey -> White -> Dark Grey */
            background: linear-gradient(90deg, #666, #fff, #666);
            background-size: 200% 100%;
            
            /* Clips background to the text and makes text transparent to show background */
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* The animation: 3 seconds duration, runs infinitely */
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>

<body>

    <div class="container" id="tilt-box">
        <h1>JayaBeth</h1>
        <!-- Added the class here -->
        <p class="glow-text">Shanky and Reece est. 2024</p>
    </div>

    <script>
        const container = document.getElementById('tilt-box');

        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;

            const rotateX = -y / 10;
            const rotateY = x / 10;

            container.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        container.addEventListener('mouseleave', () => {
            container.style.transform = 'rotateX(0deg) rotateY(0deg)';
        });
    </script>

</body>
</html>
