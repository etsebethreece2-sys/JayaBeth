                cow.add(this.add.circle(-8, -1, 5, 0x3b2a22));
                cow.add(this.add.circle(6, 5, 6, 0x3b2a22));
                cow.add(this.add.rectangle(-11, 15, 5, 13, 0x3b2a22));
                cow.add(this.add.rectangle(9, 15, 5, 13, 0x3b2a22));
                cow.add(this.add.rectangle(-11, 21, 6, 3, 0xf7f0df));
                cow.add(this.add.rectangle(9, 21, 6, 3, 0xf7f0df));

                cow.add(this.add.circle(21, -2, 10, 0xf7f0df));
                cow.add(this.add.circle(28, 1, 6, 0xf2c9bc));
                cow.add(this.add.circle(16, -7, 4, 0x3b2a22));
                cow.add(this.add.circle(26, -7, 4, 0x3b2a22));
                cow.add(this.add.rectangle(18, -3, 2, 3, 0x1e1512));
                cow.add(this.add.rectangle(24, -3, 2, 3, 0x1e1512));
                cow.add(this.add.circle(26, 2, 1.5, 0x7b4a45));
                cow.add(this.add.circle(31, 2, 1.5, 0x7b4a45));

                cow.add(this.add.rectangle(-20, -1, 10, 2, 0x3b2a22));
                cow.add(this.add.circle(-25, 1, 3, 0x3b2a22));

                const hitArea = this.add.zone(3, 2, 64, 52).setOrigin(0.5).setInteractive({ useHandCursor: true });
                hitArea.on('pointerdown', (pointer) => {
                    if (pointer && pointer.event) pointer.event.stopPropagation();
                    this.showCowHearts(x + 10, y - 16);
                });
                cow.add(hitArea);

                this.tweens.add({
                    targets: cow,
                    y: y - 1,
                    duration: 1400,
                    yoyo: true,
                    repeat: -1,
                    ease: 'Sine.easeInOut'
                });

                this.cow = cow;
            }

            showCowHearts(x, y) {
                const colors = [0xff89bf, 0xff5fa2, 0xffb3d4];

                for (let i = 0; i < 6; i++) {
                    const heart = this.add.text(x + this.randomBetween(-12, 12), y + this.randomBetween(-2, 10), '❤', {
                        fontSize: '12px',
                        color: '#ff7bb5',
                        stroke: '#ffffff',
                        strokeThickness: 2
                    });
                    heart.setDepth(40);
                    heart.setTint(colors[i % colors.length]);

                    this.tweens.add({
                        targets: heart,
                        x: heart.x + this.randomBetween(-14, 14),
                        y: heart.y - this.randomBetween(18, 34),
                        alpha: 0,
                        scale: 0.7,
                        duration: this.randomBetween(500, 780),
                        ease: 'Cubic.easeOut',
                        onComplete: () => heart.destroy()
                    });
                }
            }

            pointerToTile(x, y) {
                const col = Math.floor((x - this.gridX) / this.tileSize);
                const row = Math.floor((y - this.gridY) / this.tileSize);

                if (col < 0 || row < 0 || col >= this.gridCols || row >= this.gridRows) return null;

                return { x: col, y: row };
            }

            getCropStage(crop) {
                const plantedAt = crop.plantedAt || Date.now();
                const growthMs = crop.watered ? 14000 : 24000;
                const stage = Math.floor((Date.now() - plantedAt) / growthMs);

                return Math.max(0, Math.min(3, stage));
            }

            redrawCrops() {
                const activeKeys = new Set(Object.keys(farmCropsData || {}));

                Object.keys(this.cropObjects).forEach((key) => {
                    if (!activeKeys.has(key)) {
                        this.cropObjects[key].destroy();
                        delete this.cropObjects[key];
                        delete this.cropVisualStates[key];
                    }
                });

                Object.entries(farmCropsData || {}).forEach(([key, crop]) => {
                    if (typeof crop.tileX !== 'number' || typeof crop.tileY !== 'number') return;

                    const stage = this.getCropStage(crop);
                    const cropScale = this.getCropScale(key);
                    const visualKey = `${stage}_${crop.watered ? 1 : 0}_${cropScale.toFixed(2)}`;

                    if (this.cropObjects[key] && this.cropVisualStates[key] === visualKey) return;

                    if (this.cropObjects[key]) {
                        this.cropObjects[key].destroy();
                        delete this.cropObjects[key];
                    }

                    const centerX = this.gridX + crop.tileX * this.tileSize + this.tileSize / 2;
                    const centerY = this.gridY + crop.tileY * this.tileSize + this.tileSize / 2;
                    const container = this.add.container(centerX, centerY);
                    container.setDepth(10);
                    container.setScale(cropScale);

                    const shadow = this.add.ellipse(0, 8, 18, 7, 0x5d3a20, 0.25);
                    container.add(shadow);

                    if (stage === 0) {
                        container.add(this.add.circle(0, 2, 4, crop.watered ? 0x3f8f4f : 0x6b4a2f));
                    } else if (stage === 1) {
                        container.add(this.add.rectangle(-3, 1, 4, 12, 0x3e9c4a));
                        container.add(this.add.rectangle(3, 2, 4, 10, 0x4bae55));
                        container.add(this.add.circle(-5, -2, 4, 0x67c96b));
                        container.add(this.add.circle(5, -1, 4, 0x67c96b));
                    } else if (stage === 2) {
                        container.add(this.add.rectangle(0, 1, 5, 18, 0x2f8f3d));
                        container.add(this.add.circle(-7, -5, 6, 0x66c45f));
                        container.add(this.add.circle(7, -4, 6, 0x66c45f));
                        container.add(this.add.circle(0, -10, 5, 0x76d46c));
                    } else {
                        container.add(this.add.rectangle(0, 2, 5, 19, 0x2f8f3d));
                        container.add(this.add.circle(-8, -5, 6, 0x58b953));
                        container.add(this.add.circle(8, -5, 6, 0x58b953));
                        container.add(this.add.circle(0, -11, 6, 0x62c75a));
                        container.add(this.add.circle(0, -8, 4, 0xffcf5c));
                    }

                    if (crop.watered) {
                        container.add(this.add.circle(9, 8, 2, 0x7cd8ff, 0.9));
                    }

                    this.cropObjects[key] = container;
                    this.cropVisualStates[key] = visualKey;
                });
            }

            getCropScale(key) {
                let hash = 0;

                for (let i = 0; i < key.length; i++) {
                    hash = ((hash << 5) - hash) + key.charCodeAt(i);
                    hash |= 0;
                }

                const normalized = Math.abs(hash % 100) / 100;
                return 0.9 + normalized * 0.22;
            }

            randomBetween(min, max) {
                return min + Math.random() * (max - min);
            }

            burstCropParticles(x, y) {
                const colors = [0xffcf5c, 0xff9f43, 0x76d46c, 0xffffff];

                for (let i = 0; i < 12; i++) {
                    const particle = this.add.circle(x, y, this.randomBetween(1.6, 3.2), colors[i % colors.length], 0.95);
                    particle.setDepth(45);

                    const angle = this.randomBetween(0, Math.PI * 2);
                    const distance = this.randomBetween(20, 58);
                    const targetX = x + Math.cos(angle) * distance;
                    const targetY = y + Math.sin(angle) * distance - this.randomBetween(4, 22);

                    this.tweens.add({
                        targets: particle,
                        x: targetX,
                        y: targetY,
                        alpha: 0,
                        scale: 0.25,
                        duration: this.randomBetween(360, 620),
                        ease: 'Cubic.easeOut',
                        onComplete: () => particle.destroy()
                    });
                }
            }

            createPlayerSprite(name, player) {
                const color = player.color || farmColors[name] || 0xffffff;
                const container = this.add.container(player.x || 200, player.y || 220);

                const shadow = this.add.ellipse(0, 12, 20, 7, 0x000000, 0.25);
                const legs = this.add.rectangle(0, 10, 13, 12, 0x39271e);
                const body = this.add.rectangle(0, 0, 18, 20, color);
                const face = this.add.rectangle(0, -15, 16, 14, 0xffd7aa);
                const leftEye = this.add.rectangle(-4, -16, 2, 3, 0x2b1b15);
                const rightEye = this.add.rectangle(4, -16, 2, 3, 0x2b1b15);
                const smile = this.add.rectangle(0, -11, 6, 1, 0x9c5a45, 0.75);
                const hair = this.add.rectangle(0, -23, 18, 8, name === 'Shanky' ? 0x2b1b15 : 0x6b3f25);
                const label = this.add.text(0, -38, name, {
                    fontFamily: 'Fredoka, sans-serif',
                    fontSize: '10px',
                    color: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 3
                }).setOrigin(0.5);

                const wateringCan = this.add.container(15, -1);
                wateringCan.add(this.add.rectangle(0, 4, 12, 8, 0x6fb0d6));
                wateringCan.add(this.add.rectangle(-2, 0, 9, 5, 0x8bd4f5));
                wateringCan.add(this.add.circle(7, 3, 4, 0x6fb0d6));
                wateringCan.add(this.add.circle(7, 3, 2.2, color));
                wateringCan.add(this.add.rectangle(11, 0, 8, 3, 0x8bd4f5));
                wateringCan.add(this.add.circle(17, -1, 2, 0x8bd4f5));
                wateringCan.add(this.add.rectangle(-1, -5, 5, 2, 0xd8f6ff));
                wateringCan.setRotation(-0.16);
                wateringCan.setVisible(false);

                container.add([shadow, legs, body, face, leftEye, rightEye, smile, hair, wateringCan, label]);
                container.setDepth(20);

                container.wateringCan = wateringCan;
                container.setTool = (tool) => {
                    wateringCan.setVisible(tool === 'watering-can');
                };

                container.setTool(player.tool || (name === currentUser ? currentFarmTool : 'hand'));

                const blink = () => {
                    if (!container.active) return;

                    leftEye.setScale(1, 0.25);
                    rightEye.setScale(1, 0.25);

                    this.time.delayedCall(120, () => {
                        if (!container.active) return;
                        leftEye.setScale(1, 1);
                        rightEye.setScale(1, 1);
                    });
                };

                container.blinkTimer = this.time.addEvent({
                    delay: 1800 + Math.floor(Math.random() * 2400),
                    loop: true,
                    callback: blink
                });

                return container;
            }

            syncPlayerSprites() {
                const now = Date.now();
                const visiblePlayers = {};

                Object.entries(this.remotePlayerData || {}).forEach(([name, player]) => {
                    if (!player || now - (player.lastSeen || 0) > 45000) return;
                    visiblePlayers[name] = player;

                    if (!this.players[name]) {
                        this.players[name] = this.createPlayerSprite(name, player);
                    }

                    const sprite = this.players[name];

                    if (typeof sprite.setTool === 'function') {
                        sprite.setTool(name === currentUser ? currentFarmTool : (player.tool || 'hand'));
                    }

                    if (name === currentUser) {
                        sprite.x = player.x;
                        sprite.y = player.y;
                    } else {
                        sprite.targetX = player.x;
                        sprite.targetY = player.y;
                    }
                });

                Object.keys(this.players).forEach((name) => {
                    if (!visiblePlayers[name]) {
                        if (this.players[name].blinkTimer) {
                            this.players[name].blinkTimer.remove(false);
                        }

                        this.players[name].destroy();
                        delete this.players[name];
                    }
                });
            }

            interpolateRemotePlayers(delta) {
                Object.entries(this.players).forEach(([name, sprite]) => {
                    if (name === currentUser) return;
                    if (typeof sprite.targetX !== 'number' || typeof sprite.targetY !== 'number') return;

                    const amount = Math.min(1, delta / FARM_REMOTE_INTERPOLATION_MS);
                    sprite.x += (sprite.targetX - sprite.x) * amount;
                    sprite.y += (sprite.targetY - sprite.y) * amount;

                    if (Math.abs(sprite.targetX - sprite.x) < 0.15) sprite.x = sprite.targetX;
                    if (Math.abs(sprite.targetY - sprite.y) < 0.15) sprite.y = sprite.targetY;
                });
            }

            updateDayNightCycle(force = false) {
                const now = Date.now();

                if (!force && now - this.lastDayNightUpdate < 100) return;

                this.lastDayNightUpdate = now;

                const farmTime = getFarmTimeData();
                const clockText = formatFarmClock(farmTime);
                const clockEl = document.getElementById('farmTimeUI');

                if (clockEl && clockText !== this.lastFarmClockText) {
                    clockEl.innerText = clockText;
                    this.lastFarmClockText = clockText;
                }

                const nightAlpha = getFarmNightAlpha(farmTime.totalMinutes);
                const nightEl = document.getElementById('farmNightOverlay');

                if (nightEl) {
                    nightEl.style.background = `rgba(7, 12, 34, ${nightAlpha})`;
                }

                const glowAmount = Math.max(0, Math.min(1, (nightAlpha - 0.16) / 0.44));
                document.querySelectorAll('.farm-cabin-window-glow').forEach((glow) => {
                    glow.style.opacity = glowAmount.toFixed(2);
                    glow.style.boxShadow = `0 0 ${Math.round(10 + glowAmount * 22)}px rgba(255,214,91,${0.55 + glowAmount * 0.4}), 0 0 ${Math.round(22 + glowAmount * 34)}px rgba(255,179,56,${0.25 + glowAmount * 0.45})`;
                });

                // The DOM overlay above the Phaser canvas is the reliable visual darkness layer.
                // Keep the Phaser overlay disabled so the scene is not darkened twice.
                if (this.nightOverlay) {
                    this.nightOverlay.setAlpha(0);
                }
            }

            releaseKeyboardCapture() {
                if (!this.input || !this.input.keyboard || !window.Phaser) return;

                const keyCodes = window.Phaser.Input.Keyboard.KeyCodes;
                const movementCodes = [
                    keyCodes.W,
                    keyCodes.A,
                    keyCodes.S,
                    keyCodes.D,
                    keyCodes.UP,
                    keyCodes.DOWN,
                    keyCodes.LEFT,
                    keyCodes.RIGHT
                ];

                movementCodes.forEach((code) => {
                    if (typeof this.input.keyboard.removeCapture === 'function') {
                        this.input.keyboard.removeCapture(code);
                    }
                });

                if (typeof this.input.keyboard.clearCaptures === 'function') {
                    this.input.keyboard.clearCaptures();
                }
            }

            resetMovementKeys() {
                const keyGroups = [this.keys, this.cursors];

                keyGroups.forEach((group) => {
                    if (!group) return;

                    Object.values(group).forEach((key) => {
                        if (key && typeof key.reset === 'function') {
                            key.reset();
                        } else if (key) {
                            key.isDown = false;
                            key.isUp = true;
                            key.timeDown = 0;
                        }
                    });
                });

                if (this.input && this.input.keyboard && typeof this.input.keyboard.resetKeys === 'function') {
                    this.input.keyboard.resetKeys();
                }

                this.releaseKeyboardCapture();
            }

            focusChatAfterClose() {
                const input = document.getElementById('messageInput');

                if (!input) return;

                requestAnimationFrame(() => {
                    input.focus();
                });
            }

            setActiveState(isActive) {
                this.acceptInput = isActive;

                if (this.input && this.input.keyboard) {
                    if (!isActive) {
                        this.resetMovementKeys();
                    }

                    this.input.keyboard.enabled = isActive;

                    if (isActive) {
                        this.releaseKeyboardCapture();
                    }
                }

                if (isActive) {
                    this.updateDayNightCycle(true);
                    this.syncMyPlayer(true);
                } else {
                    remove(child(gamePlayersRef, currentUser));
                    this.focusChatAfterClose();
                }
            }

            syncMyPlayer(force = false) {
                if (!this.myPlayer) return;

                const now = Date.now();
                const movedEnough =
                    this.lastSyncedX === null ||
                    this.lastSyncedY === null ||
                    Math.abs(this.myPlayer.x - this.lastSyncedX) > FARM_PLAYER_SYNC_DISTANCE ||
                    Math.abs(this.myPlayer.y - this.lastSyncedY) > FARM_PLAYER_SYNC_DISTANCE;

                if (!force && !movedEnough) return;
                if (!force && now - this.lastPlayerSync < FARM_PLAYER_SYNC_MS) return;

                this.lastPlayerSync = now;
                this.lastSyncedX = this.myPlayer.x;
                this.lastSyncedY = this.myPlayer.y;

                const myRef = child(gamePlayersRef, currentUser);

                if (!this.onDisconnectReady) {
                    onDisconnect(myRef).remove();
                    this.onDisconnectReady = true;
                }

                set(myRef, {
                    name: currentUser,
                    x: Math.round(this.myPlayer.x),
                    y: Math.round(this.myPlayer.y),
                    color: this.myPlayer.color,
                    tool: currentFarmTool,
                    lastSeen: Date.now()
                });
            }

            isTypingInInput() {
                const tag = document.activeElement ? document.activeElement.tagName : '';
                return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
            }

            update(time, delta) {
                this.interpolateRemotePlayers(delta);
                this.updateDayNightCycle(false);

                if (!this.acceptInput || !this.myPlayer || this.isTypingInInput()) return;

                const speed = Math.min(3.2, delta * 0.115);
                let moved = false;

                if (this.keys.left.isDown || this.cursors.left.isDown) {
                    this.myPlayer.x -= speed;
                    moved = true;
                }

                if (this.keys.right.isDown || this.cursors.right.isDown) {
                    this.myPlayer.x += speed;
                    moved = true;
                }

                if (this.keys.up.isDown || this.cursors.up.isDown) {
                    this.myPlayer.y -= speed;
                    moved = true;
                }

                if (this.keys.down.isDown || this.cursors.down.isDown) {
                    this.myPlayer.y += speed;
                    moved = true;
                }

                this.myPlayer.x = window.Phaser.Math.Clamp(this.myPlayer.x, 18, FARM_INTERNAL_WIDTH - 18);
                this.myPlayer.y = window.Phaser.Math.Clamp(this.myPlayer.y, 55, FARM_INTERNAL_HEIGHT - 28);

                if (this.players[currentUser]) {
                    this.players[currentUser].x = this.myPlayer.x;
                    this.players[currentUser].y = this.myPlayer.y;
                }

                if (moved) {
                    this.syncMyPlayer(false);
                }
            }
        }

        const cleanupStaleFarmPlayers = () => {
            get(gamePlayersRef).then((snapshot) => {
                if (!snapshot.exists()) return;

                snapshot.forEach((childNode) => {
                    const player = childNode.val() || {};

                    if (Date.now() - (player.lastSeen || 0) > FARM_STALE_PLAYER_MS) {
                        remove(child(gamePlayersRef, childNode.key));
                    }
                });
            });
        };

        setInterval(cleanupStaleFarmPlayers, FARM_STALE_PLAYER_CLEANUP_MS);

        document.addEventListener('visibilitychange', () => {
            if (!farmSceneRef || !farmGameIsOpen) return;

            if (document.hidden) {
                remove(child(gamePlayersRef, currentUser));
            } else {
                farmSceneRef.syncMyPlayer(true);
            }
        });

        window.addEventListener('beforeunload', () => {
            remove(child(gamePlayersRef, currentUser));
        });


        const typingRef = (name) => ref(db, `typing/${name}`);

        const stickerFiles = [
            "cry.png",
            "dissapointed.png",
            "hungry.png",
            "kiss.png",
            "shocked.png",
            "thinking.png"
        ];

        const isStickerImage = (src) => {
            if (!src || src.startsWith('data:')) return false;
            return stickerFiles.some(file => src.endsWith(file));
        };

        const enforceMessageLimit = () => {
            get(messagesRef).then((snapshot) => {
                if (snapshot.size > 50) {
                    const messages = [];

                    snapshot.forEach((childNode) => {
                        messages.push({
                            key: childNode.key,
                            timestamp: childNode.val().timestamp
                        });
                    });

                    messages.sort((a, b) => a.timestamp - b.timestamp);
                    remove(child(messagesRef, messages[0].key));
                }
            });
        };

        window.addEventListener('DOMContentLoaded', () => {
            const startDate = new Date("2026-04-12T00:00:00");
            const today = new Date();
            const diffDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));

            document.getElementById("days-count").innerText = diffDays;
            window.renderCalendar();
            window.renderCalendarEvents();
            renderCalendarColorOptions();

            if (localStorage.getItem('darkmode') === 'enabled') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeToggle').innerText = '☀️';
            } else {
                document.getElementById('themeToggle').innerText = '🌙';
            }
        });

        const updateMyStatus = () => {
            set(ref(db, `status/${currentUser}`), {
                lastSeen: Date.now()
            });
        };

        window.addEventListener('focus', updateMyStatus);
        document.addEventListener('click', updateMyStatus);
        setTimeout(updateMyStatus, 1000);

        const listenToOtherUserStatus = () => {
            const otherUser = currentUser === 'Shanky' ? 'Reece' : 'Shanky';

            onValue(ref(db, `status/${otherUser}`), (snapshot) => {
                if (snapshot.exists()) {
                    otherUserLastSeen = snapshot.val().lastSeen;

                    document.querySelectorAll('.tick').forEach(tickEl => {
                        const ts = parseInt(tickEl.getAttribute('data-timestamp'));

                        if (ts <= otherUserLastSeen) {
                            tickEl.classList.remove('unread');
                            tickEl.classList.add('read');
                        }
                    });
                }
            });
        };

        listenToOtherUserStatus();

        window.handleTyping = () => {
            const input = document.getElementById("messageInput");

            if (!input || input.value.trim().length === 0) {
                set(typingRef(currentUser), {
                    isTyping: false,
                    timestamp: Date.now()
                });
                return;
            }

            set(typingRef(currentUser), {
                isTyping: true,
                timestamp: Date.now()
            });

            clearTimeout(typingTimeout);

            typingTimeout = setTimeout(() => {
                set(typingRef(currentUser), {
                    isTyping: false,
                    timestamp: Date.now()
                });
            }, 1200);
        };

        const listenToTypingStatus = () => {
            const otherUser = currentUser === 'Shanky' ? 'Reece' : 'Shanky';
            const indicator = document.getElementById('typingIndicator');
            const typingText = document.getElementById('typingText');
            let latestTypingData = null;

            const updateIndicator = (data) => {
                if (!indicator || !typingText) return;

                if (!data) {
                    indicator.classList.remove('show');
                    return;
                }

                const isFresh = Date.now() - data.timestamp < 2500;

                if (data.isTyping && isFresh) {
                    typingText.innerText = `${otherUser} is typing`;
                    indicator.classList.add('show');
                } else {
                    indicator.classList.remove('show');
                }
            };

            onValue(typingRef(otherUser), (snapshot) => {
                latestTypingData = snapshot.exists() ? snapshot.val() : null;
                updateIndicator(latestTypingData);
            });

            clearInterval(typingWatchdog);

            typingWatchdog = setInterval(() => {
                updateIndicator(latestTypingData);
            }, 500);
        };

        listenToTypingStatus();

        const savedRGB = localStorage.getItem('yapboxRGB') || '190, 160, 230';
        const savedAlpha = localStorage.getItem('yapboxAlpha') || '0.85';

        document.documentElement.style.setProperty('--box-base-rgb', savedRGB);
        document.documentElement.style.setProperty('--box-alpha', savedAlpha);
        document.getElementById('opacitySlider').value = savedAlpha;

        window.closeMessageDropdown = (menu) => {
            if (!menu || menu.style.display === 'none') return;

            menu.classList.remove('dropdown-open');
            menu.classList.add('dropdown-closing');

            setTimeout(() => {
                menu.style.display = 'none';
                menu.classList.remove('dropdown-closing');
            }, 160);
        };

        window.closeAllMessageDropdowns = (exceptMenu = null) => {
            document.querySelectorAll('.msg-dropdown-menu').forEach(menu => {
                if (menu !== exceptMenu) {
                    closeMessageDropdown(menu);
                }
            });
        };

        window.openMessageDropdown = (menu) => {
            closeAllMessageDropdowns(menu);

            menu.style.display = 'flex';
            menu.classList.remove('dropdown-closing');

            requestAnimationFrame(() => {
                menu.classList.add('dropdown-open');
            });
        };

        document.addEventListener('click', () => {
            closeAllMessageDropdowns();
        });

        window.toggleClearBtn = () => {
            const input = document.getElementById("messageInput");
            document.getElementById("clearBtn").style.display = input.value.length > 0 ? "flex" : "none";
        };

        window.clearInput = () => {
            const input = document.getElementById("messageInput");

            input.value = "";
            toggleClearBtn();
            input.focus();

            set(typingRef(currentUser), {
                isTyping: false,
                timestamp: Date.now()
            });
        };

        window.addBucketItem = () => {
            const input = document.getElementById("bucketInput");
            if (input.value.trim() === "") return;

            push(bucketListRef, {
                text: input.value,
                timestamp: Date.now(),
                creator: currentUser
            });

            input.value = "";
        };

        window.handleBucketKeyPress = (e) => {
            if (e.key === 'Enter') addBucketItem();
        };

        window.deleteBucketItem = (key, btn) => {
            const li = btn.closest('.bucket-item');
            li.classList.add('deleting');

            setTimeout(() => {
                remove(child(bucketListRef, key));
            }, 300);
        };

        onValue(bucketListRef, (snapshot) => {
            const listDiv = document.getElementById("bucketList");
            listDiv.innerHTML = "";

            if (!snapshot.exists()) return;

            snapshot.forEach((childNode) => {
                const data = childNode.val();
                const key = childNode.key;

                const li = document.createElement('li');
                li.className = 'bucket-item';

                li.innerHTML = `
                    <span>${data.text}</span>
                    <button class="delete-item-btn" onclick="deleteBucketItem('${key}', this)">✕</button>
                `;

                listDiv.appendChild(li);
            });

            listDiv.scrollTop = listDiv.scrollHeight;
        });

        onValue(calendarEventsRef, (snapshot) => {
            calendarEvents = snapshot.exists() ? snapshot.val() : {};
            window.renderCalendar();
            window.renderCalendarEvents();
            renderCalendarColorOptions();
        });

        window.toggleColorMenu = (e) => {
            if (e) e.stopPropagation();

            const menu = document.getElementById('colorMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        };

        window.changeBaseColor = (rgb) => {
            document.documentElement.style.setProperty('--box-base-rgb', rgb);
            localStorage.setItem('yapboxRGB', rgb);
        };

        window.changeAlpha = (val) => {
            document.documentElement.style.setProperty('--box-alpha', val);
            localStorage.setItem('yapboxAlpha', val);
        };

        const formatTime = (ts) => {
            const date = new Date(ts);

            return date.getHours().toString().padStart(2, '0') + ':' +
                   date.getMinutes().toString().padStart(2, '0');
        };

        const formatMessageLinks = (text) => {
            const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
            return text.replace(urlPattern, '<a href="$1" target="_blank">$1</a>');
        };

        const getMessagePreviewText = (data = {}) => {
            if (data.text) return data.text;
            if (data.fileData) return data.fileName ? `[File: ${data.fileName}]` : '[File]';
            if (data.video) return data.fileName ? `[Video: ${data.fileName}]` : '[Video]';
            if (data.isSticker) return '[Sticker]';
            if (data.image) return '[Image]';
            return '[Message]';
        };

        const shortenPreviewText = (text, length = 20) => {
            const safeText = text || '[Message]';
            return safeText.length > length ? safeText.substring(0, length) + '...' : safeText;
        };

        const stopTypingForCurrentUser = () => {
            set(typingRef(currentUser), {
                isTyping: false,
                timestamp: Date.now()
            });
        };

        const updateImageCounter = () => {
            const counter = document.getElementById('imageCounter');
            const deleteBtn = document.getElementById('lightboxDeleteBtn');

            if (!counter) return;

            if (galleryImages.length > 0 && currentImgIndex >= 0) {
                counter.innerText = `${currentImgIndex + 1} / ${galleryImages.length}`;
                counter.style.display = 'block';
                if (deleteBtn) deleteBtn.style.display = galleryImageKeys[currentImgIndex] ? 'block' : 'none';
            } else {
                counter.style.display = 'none';
                if (deleteBtn) deleteBtn.style.display = 'none';
            }
        };

        window.openLightbox = (src) => {
            const lightbox = document.getElementById('lightbox');
            const imgEl = document.getElementById('lightbox-img');

            imgEl.src = src;
            lightbox.style.display = 'flex';

            requestAnimationFrame(() => {
                lightbox.classList.add('active');
                imgEl.classList.remove('opening');
                void imgEl.offsetWidth;
                imgEl.classList.add('opening');
            });

            currentImgIndex = galleryImages.indexOf(src);
            updateImageCounter();
        };

        window.navigateLightbox = (dir) => {
            if (galleryImages.length === 0) return;

            currentImgIndex = (currentImgIndex + dir + galleryImages.length) % galleryImages.length;

            const imgEl = document.getElementById('lightbox-img');
            imgEl.src = galleryImages[currentImgIndex];

            imgEl.classList.remove('switching');
            void imgEl.offsetWidth;
            imgEl.classList.add('switching');

            updateImageCounter();
        };

        window.closeLightbox = () => {
            const lightbox = document.getElementById('lightbox');
            const counter = document.getElementById('imageCounter');
            const deleteBtn = document.getElementById('lightboxDeleteBtn');

            if (counter) counter.style.display = 'none';
            if (deleteBtn) deleteBtn.style.display = 'none';

            lightbox.classList.remove('active');
            lightbox.classList.add('closing');

            setTimeout(() => {
                lightbox.style.display = 'none';
                lightbox.classList.remove('closing');
            }, 250);
        };


        window.deleteCurrentLightboxImage = () => {
            const key = galleryImageKeys[currentImgIndex];

            if (!key) return;
            if (!confirm('Delete this gallery image?')) return;

            remove(child(galleryRef, key));
            window.closeLightbox();
        };

        window.startReply = (text, user) => {
            const replyText = text || "[Media]";

            replyingTo = {
                text: replyText,
                user: user
            };

            const bar = document.getElementById('replyBar');
            bar.style.display = 'block';

            bar.innerHTML = `
                <strong>Replying to ${user}:</strong> ${replyText}
                <span onclick="cancelReply()" style="cursor:pointer; float:right;">✕</span>
            `;
        };

        window.cancelReply = () => {
            replyingTo = null;
            document.getElementById('replyBar').style.display = 'none';
        };

        window.pinMessage = (msgData) => {
            set(pinnedRef, msgData);
        };

        window.unpinMessage = () => {
            remove(pinnedRef);
        };

        window.deleteMessage = (key, rowElement) => {
            if (confirm("Delete this message?")) {
                if (rowElement) {
                    rowElement.classList.add('deleting-msg');

                    setTimeout(() => {
                        remove(child(messagesRef, key));
                    }, 300);
                } else {
                    remove(child(messagesRef, key));
                }
            }
        };

        onValue(pinnedRef, (snapshot) => {
            const bar = document.getElementById('pinnedBar');
            const content = document.getElementById('pinnedContent');

            if (snapshot.exists()) {
                const data = snapshot.val();

                content.innerHTML = `
                    <strong>📌 Pinned</strong> - ${data.name}: ${getMessagePreviewText(data)}
                `;

                bar.style.display = 'flex';
            } else {
                bar.style.display = 'none';
            }
        });

        window.startHold = (event, imgData) => {
            holdTimer = setTimeout(() => {
                const target = event.target;

                if (target.parentElement.querySelector('.save-overlay')) return;

                const overlay = document.createElement('div');
                overlay.className = 'save-overlay';
                overlay.innerText = 'Save to Gallery';

                overlay.onclick = (e) => {
                    e.stopPropagation();

                    push(galleryRef, {
                        image: imgData,
                        timestamp: Date.now()
                    });

                    overlay.innerText = 'Saved!';

                    setTimeout(() => overlay.remove(), 1000);
                };

                target.parentElement.appendChild(overlay);

                setTimeout(() => {
                    if (overlay) overlay.remove();
                }, 3000);
            }, 1000);
        };

        window.endHold = () => clearTimeout(holdTimer);

        const MAX_VIDEO_UPLOAD_BYTES = 25 * 1024 * 1024; // 25 MB. Videos are stored as data URLs in Realtime Database, so keep clips short.
        const MAX_FILE_UPLOAD_BYTES = 25 * 1024 * 1024; // 25 MB. ZIPs and other files are also stored as data URLs so the other person can download them.

        const formatFileSize = (bytes = 0) => {
            if (!Number.isFinite(bytes) || bytes <= 0) return 'Unknown size';

            const units = ['B', 'KB', 'MB', 'GB'];
            let size = bytes;
            let unitIndex = 0;

            while (size >= 1024 && unitIndex < units.length - 1) {
                size = size / 1024;
                unitIndex++;
            }

            const rounded = unitIndex === 0 ? Math.round(size) : size.toFixed(size >= 10 ? 1 : 2);
            return `${rounded} ${units[unitIndex]}`;
        };

        const getFileEmoji = (fileName = '', mimeType = '') => {
            const lowerName = fileName.toLowerCase();
            const lowerMime = mimeType.toLowerCase();

            if (lowerName.endsWith('.zip') || lowerName.endsWith('.rar') || lowerName.endsWith('.7z') || lowerMime.includes('zip') || lowerMime.includes('compressed')) return '🗜️';
            if (lowerName.endsWith('.pdf') || lowerMime.includes('pdf')) return '📕';
            if (lowerName.endsWith('.doc') || lowerName.endsWith('.docx') || lowerMime.includes('word')) return '📘';
            if (lowerName.endsWith('.xls') || lowerName.endsWith('.xlsx') || lowerMime.includes('spreadsheet') || lowerMime.includes('excel')) return '📗';
            if (lowerName.endsWith('.ppt') || lowerName.endsWith('.pptx') || lowerMime.includes('presentation') || lowerMime.includes('powerpoint')) return '📙';
            if (lowerName.endsWith('.mp3') || lowerName.endsWith('.wav') || lowerName.endsWith('.m4a') || lowerMime.startsWith('audio/')) return '🎧';
            return '📦';
        };

        const pushMediaMessage = (mediaData) => {
            stopTypingForCurrentUser();

            push(messagesRef, {
                name: currentUser,
                timestamp: Date.now(),
                replyTo: replyingTo,
                animationId: `${Date.now()}-${Math.random()}`,
                ...mediaData
            }).catch((error) => {
                alert(`Could not send media: ${error.message}`);
            });

            cancelReply();
            updateMyStatus();
            enforceMessageLimit();
        };

        const sendImageFileToChat = (file) => {
            if (!file || !file.type || !file.type.startsWith('image/')) return;

            const reader = new FileReader();

            reader.onload = (event) => {
                const img = new Image();

                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const maxWidth = 400;
                    const scale = Math.min(1, maxWidth / img.width);

                    canvas.width = Math.max(1, Math.round(img.width * scale));
                    canvas.height = Math.max(1, Math.round(img.height * scale));

                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);

                    pushMediaMessage({
                        image: canvas.toDataURL('image/jpeg', 0.65),
                        mediaType: 'image',
                        fileName: file.name || ''
                    });
                };

                img.onerror = () => alert('Could not load that image. Please try another file.');
                img.src = event.target.result;
            };

            reader.onerror = () => alert('Could not read that image file.');
            reader.readAsDataURL(file);
        };

        const sendVideoFileToChat = (file) => {
            if (!file || !file.type || !file.type.startsWith('video/')) return;

            if (file.size > MAX_VIDEO_UPLOAD_BYTES) {
                alert('That video is too large for this chat. Please choose a clip under 25 MB.');
                return;
            }

            const reader = new FileReader();

            reader.onload = (event) => {
                pushMediaMessage({
                    video: event.target.result,
                    mediaType: 'video',
                    mimeType: file.type,
                    fileName: file.name || 'video'
                });
            };

            reader.onerror = () => alert('Could not read that video file.');
            reader.readAsDataURL(file);
        };

        const sendGenericFileToChat = (file) => {
            if (!file) return;

            if (file.size > MAX_FILE_UPLOAD_BYTES) {
                alert('That file is too large for this chat. Please choose a file under 25 MB.');
                return;
            }

            const reader = new FileReader();

            reader.onload = (event) => {
                pushMediaMessage({
                    fileData: event.target.result,
                    mediaType: 'file',
                    mimeType: file.type || 'application/octet-stream',
                    fileName: file.name || 'download',
                    fileSize: file.size || 0
                });
            };

            reader.onerror = () => alert('Could not read that file.');
            reader.readAsDataURL(file);
        };

        const sendMediaFileToChat = (file) => {
            if (!file) return;

            if (file.type && file.type.startsWith('image/')) {
                sendImageFileToChat(file);
                return;
            }

            if (file.type && file.type.startsWith('video/')) {
                sendVideoFileToChat(file);
                return;
            }

            sendGenericFileToChat(file);
        };

        window.handleMediaUpload = (e) => {
            const file = e.target.files[0];
            sendMediaFileToChat(file);
            e.target.value = '';
        };

        window.handleImageUpload = window.handleMediaUpload;

        window.handlePasteImage = (event) => {
            const items = event.clipboardData ? Array.from(event.clipboardData.items || []) : [];
            const mediaItem = items.find(item => item.kind === 'file');

            if (!mediaItem) return;

            const file = mediaItem.getAsFile();
            if (!file) return;

            event.preventDefault();
            sendMediaFileToChat(file);
        };

        document.addEventListener('paste', window.handlePasteImage);

        const chatContainerForDrop = document.querySelector('.chat-container');

        if (chatContainerForDrop) {
            chatContainerForDrop.addEventListener('dragover', (event) => {
                const hasFiles = event.dataTransfer && Array.from(event.dataTransfer.types || []).includes('Files');
                if (!hasFiles) return;
                event.preventDefault();
            });

            chatContainerForDrop.addEventListener('drop', (event) => {
                const file = event.dataTransfer && event.dataTransfer.files ? event.dataTransfer.files[0] : null;
                if (!file) return;

                event.preventDefault();
                sendMediaFileToChat(file);
            });
        }

        window.sendSticker = (stickerSrc) => {
            stopTypingForCurrentUser();

            push(messagesRef, {
                name: currentUser,
                image: stickerSrc,
                isSticker: true,
                timestamp: Date.now(),
                replyTo: replyingTo,
                animationId: `${Date.now()}-${Math.random()}`
            });

            cancelReply();
            updateMyStatus();
            enforceMessageLimit();
            closeStickerMenu();
        };

        window.sendMessage = () => {
            const input = document.getElementById("messageInput");

            if (input.value.trim() === "") return;

            stopTypingForCurrentUser();

            push(messagesRef, {
                name: currentUser,
                text: input.value,
                timestamp: Date.now(),
                replyTo: replyingTo,
                animationId: `${Date.now()}-${Math.random()}`
            });

            input.value = "";
            toggleClearBtn();
            cancelReply();
            updateMyStatus();
            enforceMessageLimit();
        };

        window.changeUser = (radio) => {
            localStorage.setItem('yapboxUser', radio.value);
            location.reload();
        };

        window.handleKeyPress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };

        window.resetChat = () => {
            if (confirm("Clear Chat?")) {
                const msgs = document.getElementById('messages');

                msgs.classList.add('wiping');

                setTimeout(() => {
                    remove(messagesRef);
                    msgs.classList.remove('wiping');
                    renderedMessageKeys.clear();
                    knownMessageKeys.clear();
                    firstMessageRenderDone = false;
                }, 400);
            }
        };

        window.deleteGalleryItem = (event, key) => {
            event.stopPropagation();
            remove(child(galleryRef, key));
        };

        onValue(messagesRef, (snapshot) => {
            const messagesDiv = document.getElementById("messages");
            messagesDiv.innerHTML = "";

            const currentKeysThisRender = new Set();

            if (!snapshot.exists()) {
                firstMessageRenderDone = true;
                return;
            }

            snapshot.forEach((childNode) => {
                const data = childNode.val();
                const key = childNode.key;
                const isMine = data.name === currentUser;
                const isSticker = data.isSticker || isStickerImage(data.image);

                currentKeysThisRender.add(key);

                const row = document.createElement('div');
                row.className = `message-row ${isMine ? 'mine' : 'theirs'}`;

                const shouldAnimateMessage = firstMessageRenderDone && !knownMessageKeys.has(key);

                if (shouldAnimateMessage) {
                    row.classList.add('message-animate');
                }

                const wrapper = document.createElement('div');
                wrapper.className = `msg-wrapper ${isMine ? 'mine' : 'theirs'}`;

                const bubble = document.createElement('div');
                bubble.className = `bubble ${isMine ? 'bubble-mine' : 'bubble-theirs'} ${isSticker ? 'sticker-bubble' : ''}`;

                bubble.onclick = (e) => {
                    const interactiveMedia = ['IMG', 'VIDEO', 'A', 'BUTTON'].includes(e.target.tagName) || e.target.closest('.file-attachment-card');

                    if (!interactiveMedia && !e.target.closest('.msg-dropdown-container')) {
                        startReply(getMessagePreviewText(data), data.name);
                    }
                };

                if (isMine) {
                    const dropdownContainer = document.createElement('div');
                    dropdownContainer.className = 'msg-dropdown-container';

                    const dropBtn = document.createElement('button');
                    dropBtn.className = 'msg-dropdown-btn';
                    dropBtn.innerHTML = '&#8964;';

                    const dropMenu = document.createElement('div');
                    dropMenu.className = 'msg-dropdown-menu';

                    const pinBtn = document.createElement('button');
                    pinBtn.innerText = '📌 Pin';

                    pinBtn.onclick = (e) => {
                        e.stopPropagation();
                        pinMessage(data);
                        closeMessageDropdown(dropMenu);
                    };

                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'delete-msg-btn';
                    deleteBtn.innerText = '🗑️ Delete';

                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteMessage(key, row);
                        closeMessageDropdown(dropMenu);
                    };

                    dropMenu.appendChild(pinBtn);
                    dropMenu.appendChild(deleteBtn);

                    dropBtn.onclick = (e) => {
                        e.stopPropagation();

                        const isOpen = dropMenu.classList.contains('dropdown-open');

                        if (isOpen) {
                            closeMessageDropdown(dropMenu);
                        } else {
                            openMessageDropdown(dropMenu);
                        }
                    };

                    dropdownContainer.appendChild(dropBtn);
                    dropdownContainer.appendChild(dropMenu);
                    bubble.appendChild(dropdownContainer);
                }

                if (data.replyTo) {
                    const quote = document.createElement('div');
                    quote.className = 'quote-box';

                    quote.innerText = `${data.replyTo.user}: ${shortenPreviewText(data.replyTo.text)}`;

                    bubble.appendChild(quote);
                }

                if (data.image) {
                    const img = document.createElement('img');
                    img.src = data.image;

                    if (!isSticker) {
                        img.onmousedown = (e) => startHold(e, data.image);
                        img.onmouseup = endHold;
                        img.onmouseleave = endHold;
                        img.ontouchstart = (e) => startHold(e, data.image);
                        img.ontouchend = endHold;

                        img.onclick = (e) => {
                            e.stopPropagation();
                            openLightbox(data.image);
                        };
                    } else {
                        img.onclick = (e) => e.stopPropagation();
                    }

                    bubble.appendChild(img);
                } else if (data.video) {
                    const video = document.createElement('video');
                    video.src = data.video;
                    video.controls = true;
                    video.playsInline = true;
                    video.preload = 'metadata';

                    video.onclick = (e) => e.stopPropagation();
                    video.onmousedown = (e) => e.stopPropagation();
                    video.ontouchstart = (e) => e.stopPropagation();

                    bubble.appendChild(video);

                    if (data.fileName) {
                        const fileName = document.createElement('div');
                        fileName.className = 'video-file-name';
                        fileName.innerText = data.fileName;
                        bubble.appendChild(fileName);
                    }
                } else if (data.fileData) {
                    const fileCard = document.createElement('div');
                    fileCard.className = 'file-attachment-card';
                    fileCard.onclick = (e) => e.stopPropagation();

                    const fileIcon = document.createElement('div');
                    fileIcon.className = 'file-attachment-icon';
                    fileIcon.innerText = getFileEmoji(data.fileName, data.mimeType);

                    const fileInfo = document.createElement('div');
                    fileInfo.className = 'file-attachment-info';

                    const fileName = document.createElement('div');
                    fileName.className = 'file-attachment-name';
                    fileName.innerText = data.fileName || 'download';

                    const fileMeta = document.createElement('div');
                    fileMeta.className = 'file-attachment-meta';
                    fileMeta.innerText = formatFileSize(data.fileSize || 0);

                    const downloadLink = document.createElement('a');
                    downloadLink.className = 'file-download-btn';
                    downloadLink.href = data.fileData;
                    downloadLink.download = data.fileName || 'download';
                    downloadLink.innerText = '⬇ Save file';
                    downloadLink.onclick = (e) => e.stopPropagation();

                    fileInfo.appendChild(fileName);
                    fileInfo.appendChild(fileMeta);
                    fileInfo.appendChild(downloadLink);

                    fileCard.appendChild(fileIcon);
                    fileCard.appendChild(fileInfo);
                    bubble.appendChild(fileCard);
                } else {
                    const textSpan = document.createElement('span');
                    textSpan.innerHTML = formatMessageLinks(data.text || '');
                    bubble.appendChild(textSpan);
                }

                const time = document.createElement('div');
                time.className = 'timestamp';
                time.innerText = formatTime(data.timestamp);

                if (isMine) {
                    const tickSpan = document.createElement('span');

                    tickSpan.className = 'tick ' + (data.timestamp <= otherUserLastSeen ? 'read' : 'unread');
                    tickSpan.setAttribute('data-timestamp', data.timestamp);
                    tickSpan.innerText = '✓✓';

                    time.appendChild(tickSpan);
                }

                wrapper.appendChild(bubble);
                wrapper.appendChild(time);

                row.appendChild(wrapper);
                messagesDiv.appendChild(row);
            });

            currentKeysThisRender.forEach(key => knownMessageKeys.add(key));

            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            firstMessageRenderDone = true;
        });

        onValue(galleryRef, (snapshot) => {
            const galleryDiv = document.getElementById("gallery");

            galleryDiv.innerHTML = "";
            galleryImages = [];
            galleryImageKeys = [];

            if (!snapshot.exists()) return;

            snapshot.forEach((childNode) => {
                const data = childNode.val();
                const key = childNode.key;

                galleryImages.push(data.image);
                galleryImageKeys.push(key);

                const item = document.createElement('div');
                item.className = 'gallery-item';

                const img = document.createElement('img');
                img.src = data.image;
                img.onclick = () => openLightbox(data.image);

                item.appendChild(img);

                galleryDiv.appendChild(item);
            });
        });

        if (currentUser === 'Reece') {
            document.getElementById('userReece').checked = true;
        } else {
            document.getElementById('userShanky').checked = true;
        }

        const wrapper = document.getElementById('app-wrapper');

        window.addEventListener('mousemove', (e) => {
            if (farmGameIsOpen || wrapper.classList.contains('farm-mode')) {
                wrapper.style.transform = 'none';
                wrapper.style.boxShadow = '0 20px 50px rgba(0,0,0,0.48)';
                return;
            }

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            const x = (e.clientX - centerX) / 80;
            const y = (e.clientY - centerY) / 80;

            wrapper.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
            wrapper.style.boxShadow = `${-x}px ${y + 20}px 50px rgba(0,0,0,0.48)`;
        });
    </script>
</body>
</html>
