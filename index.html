<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
        }

        .container {
            /* Positioning it at the top left */
            position: absolute;
            top: 20px;
            left: 20px;
            
            /* Visual styles */
            text-align: center;
            /* Using rgba for background opacity: 0.5 is 50% transparent */
            background: rgba(255, 255, 255, 0.5); 
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { color: #333; margin-top: 0; }
        p { color: #666; margin-bottom: 0; }
    </style>
</head>

<body>
    <div class="container">
        <h1>JayaBeth</h1>
        <p>Shanky and Reece est. 2024</p>
    </div>
</body>
</html>
