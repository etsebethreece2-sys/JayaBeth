<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JayaBeth - The Yap Box</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --box-base-rgb: 190, 160, 230; 
            --box-alpha: 0.85;
        }

        /* --- Lilac Theme Scrollbars --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #b19cd9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #8a2be2; }

        body { 
            font-family: 'Fredoka', sans-serif; 
            margin: 0; padding: 20px; min-height: 100vh; 
            background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)), #fff9fa url('lilacavo.jpg'); 
            background-size: 650px; 
            animation: moveBackground 144s linear infinite; 
            display: flex; justify-content: center; align-items: center; 
            perspective: 1000px; overflow: hidden;
        }
        @keyframes moveBackground { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        /* 3D Wrapper */
        #app-wrapper {
            transition: transform 0.1s ease-out, box-shadow 0.3s ease;
            transform-style: preserve-3d;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.48);
            position: relative; /* Context for sidebar */
            padding: 20px;
        }

        .main-app-container { display: flex; gap: 20px; align-items: flex-start; max-width: 1300px; }

        /* Sidebar Drawer */
        .sidebar-drawer {
            position: absolute; top: 0; left: -200px; bottom: 0; width: 180px;
            background: rgba(255, 255, 255, 0.95); z-index: 100;
            padding: 60px 20px 20px 20px; border-radius: 25px 0 0 25px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.2);
            transition: 0.3s ease; display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto; opacity: 0; pointer-events: none;
        }
        .sidebar-drawer.active { left: 0; opacity: 1; pointer-events: all; }

        .menu-toggle {
            position: absolute; top: 20px; left: 20px; z-index: 101;
            background: rgba(255,255,255,0.7); border: none; border-radius: 50%;
            width: 40px; height: 40px; cursor: pointer; font-size: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.2s;
        }
        .menu-toggle:hover { transform: scale(1.1); background: white; }

        /* Shared Box Style */
        .box-style { 
            background-color: rgba(var(--box-base-rgb), var(--box-alpha));
            background-image: radial-gradient(rgba(255, 255, 255, 0.2) 1px, transparent 1px);
            background-size: 20px 20px;
            border-radius: 30px; 
            border: 3px solid #4a3554; 
            box-shadow: 2px 2px 0px 0px #4a3554; 
            padding: 15px; box-sizing: border-box; 
        }

        /* --- Components --- */
        .date-box { width: 100%; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; padding: 15px; }
        .date-number { font-size: 2.8em; font-weight: 700; color: #8a2be2; line-height: 1; text-shadow: 1px 1px 0px rgba(255,255,255,0.7); }
        .date-text { font-size: 0.9em; font-weight: 600; color: #333; line-height: 1.2; }

        .music-box { width: 100%; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .song-title { font-size: 0.85em; font-weight: bold; color: #333; margin-bottom: -2px; }
        #playPauseBtn { background: #8a2be2; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 16px; transition: transform 0.2s, background 0.2s; }
        #playPauseBtn:hover { transform: scale(1.1); filter: brightness(1.1); }
        .volume-control { display: flex; align-items: center; width: 100%; gap: 6px; font-size: 12px; color: #333; }
        .custom-slider { -webkit-appearance: none; width: 100%; background: transparent; }
        .custom-slider::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: rgba(138, 43, 226, 0.3); border-radius: 3px; }
        .custom-slider::-webkit-slider-thumb { height: 12px; width: 12px; border-radius: 50%; background: #8a2be2; cursor: pointer; -webkit-appearance: none; margin-top: -3px; }
        
        .calendar-box { width: 100%; padding: 12px 10px; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; width: 100%; font-weight: 600; font-size: 0.9em; color: #333; }
        .calendar-header button { background: none; border: none; cursor: pointer; color: #8a2be2; font-size: 12px; font-weight: bold; }
        .calendar-days { display: grid; grid-template-columns: repeat(7, 1fr); width: 100%; text-align: center; font-size: 10px; font-weight: bold; color: #666; }
        .calendar-dates { display: grid; grid-template-columns: repeat(7, 1fr); width: 100%; text-align: center; gap: 2px 0; }
        .calendar-date { font-size: 10px; height: 18px; width: 18px; line-height: 18px; margin: 0 auto; border-radius: 50%; color: #333; }
        .calendar-date.today { background: #8a2be2; color: white; font-weight: bold; }

        .heart-box { width: 100%; display: flex; justify-content: center; align-items: center; padding: 10px; cursor: pointer; }
        .heart-btn { font-size: 30px; background: none; border: none; cursor: pointer; }

        /* Gallery/Chat/Bucket Styles */
        .side-container { width: 260px; height: 600px; display: flex; flex-direction: column; }
        .header-style { font-weight: bold; color: #333; margin-bottom: 10px; text-align: center; border-bottom: 2px solid rgba(255, 255, 255, 0.5); padding-bottom: 10px; font-size: 1.1em; }
        #gallery { flex-grow: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; align-content: flex-start; padding-right: 5px; }
        .gallery-item { position: relative; width: 100%; aspect-ratio: 1; border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid #000; box-sizing: border-box; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: rgba(255, 0, 0, 0.8); color: white; border: none; border-radius: 50%; width: 12px; height: 12px; cursor: pointer; font-size: 8px; }
        
        .chat-container { width: 400px; height: 600px; display: flex; flex-direction: column; position: relative; }
        .btn-reset { position: absolute; top: 20px; left: 20px; background: none; border: none; color: #333; font-size: 11px; cursor: pointer; text-decoration: underline; }
        .color-toggle { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 20px; }
        .color-menu { display: none; position: absolute; top: 45px; right: 15px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.32); z-index: 20; width: 180px; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .color-option { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 1px solid #ccc; }
        .chat-header { font-weight: bold; color: #333; margin-bottom: 10px; text-align: center; padding-bottom: 10px; font-size: 1.3em; border-bottom: 2px solid rgba(255, 255, 255, 0.5); }
        .user-selector { display: flex; justify-content: center; background: rgba(255,255,255,0.4); border-radius: 20px; padding: 4px; width: 180px; margin: 8px auto 0 auto; }
        .user-selector input { display: none; }
        .user-selector label { padding: 5px 15px; cursor: pointer; font-size: 13px; border-radius: 16px; color: #555; flex: 1; text-align: center; }
        .user-selector input:checked + label { background: #8a2be2; color: white; font-weight: bold; }
        .messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px; }
        .message-row { display: flex; width: 100%; position: relative; }
        .message-row.mine { justify-content: flex-end; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 75%; position: relative; }
        .bubble { padding: 10px 24px 10px 14px; border-radius: 20px; font-size: 15px; position: relative; word-wrap: break-word; cursor: pointer; }
        .bubble-mine { background-color: #8a2be2; color: white; border-bottom-right-radius: 4px; }
        .bubble-theirs { background-color: #ffffff; color: #333; border-bottom-left-radius: 4px; }
        .chat-inputs { display: flex; flex-direction: row; gap: 8px; margin-top: 10px; align-items: center; }
        .input-wrapper { display: flex; flex-grow: 1; position: relative; align-items: center; }
        .input-wrapper input { width: 100%; padding: 12px 35px 12px 15px; border: none; border-radius: 25px; outline: none; font-family: 'Fredoka', sans-serif; box-sizing: border-box; }
        .sticker-menu { display: none; position: absolute; bottom: 75px; left: 10px; right: 10px; height: 150px; background: white; border-radius: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); z-index: 20; padding: 10px; overflow-y: auto; }
        .sticker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        .bucket-list { flex-grow: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
        .bucket-item { background: rgba(255, 255, 255, 0.4); padding: 10px 12px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .delete-item-btn { background: none; border: none; color: #ff4d4d; cursor: pointer; font-weight: bold; }
        
        /* Dark Mode */
        body.dark-mode { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), #121212 url('lilacavo.jpg'); color: #e0e0e0; }
        body.dark-mode .sidebar-drawer { background: #222; border: 1px solid #444; }
        body.dark-mode .box-style { filter: brightness(0.6); border: 1px solid #444; }
    </style>
</head>

<body>
    <div id="lightbox" class="lightbox-overlay" onclick="closeLightbox()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); z-index:9999; align-items:center; justify-content:center;">
        <span class="close-lightbox" onclick="closeLightbox()" style="position:absolute; top:30px; right:40px; font-size:40px; color:white; cursor:pointer; font-weight:bold;">&times;</span>
        <button class="lightbox-nav prev" onclick="event.stopPropagation(); navigateLightbox(-1)">&#10094;</button>
        <img id="lightbox-img" class="lightbox-img" style="max-width:90%; max-height:90%; border-radius:15px;" src="" onclick="event.stopPropagation()">
        <button class="lightbox-nav next" onclick="event.stopPropagation(); navigateLightbox(1)">&#10095;</button>
    </div>

    <div id="app-wrapper">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

        <!-- Sidebar Drawer -->
        <div id="sidebar" class="sidebar-drawer box-style">
            <div class="date-box box-style">
                <div class="date-text">It was official</div>
                <div class="date-number" id="days-count">0</div>
                <div class="date-text">days ago</div>
            </div>

            <div class="music-box box-style">
                <audio id="audioPlayer"></audio>
                <div class="song-title" id="songTitle">Select a song</div>
                <div style="display: flex; gap: 5px; align-items: center;">
                    <button onclick="prevTrack()" style="background:none; border:none; cursor:pointer; font-size:16px;">⏮</button>
                    <button id="playPauseBtn" onclick="togglePlay()">▶</button>
                    <button onclick="nextTrack()" style="background:none; border:none; cursor:pointer; font-size:16px;">⏭</button>
                </div>
                <input type="range" id="musicSlider" class="custom-slider" value="0" min="0" max="100" oninput="seekAudio()">
                <div class="volume-control">
                    <span>🔊</span>
                    <input type="range" id="volumeSlider" class="custom-slider" value="1" min="0" max="1" step="0.01" oninput="changeVolume()">
                </div>
            </div>

            <div class="calendar-box box-style">
                <div class="calendar-header">
                    <button id="prevMonth" onclick="changeMonth(-1)">&#9664;</button>
                    <span id="monthYear"></span>
                    <button id="nextMonth" onclick="changeMonth(1)">&#9654;</button>
                </div>
                <div class="calendar-days">
                    <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
                </div>
                <div class="calendar-dates" id="calendarDates"></div>
            </div>

            <div class="heart-box box-style" onclick="spawnHeart()">
                <button class="heart-btn">❤️</button>
            </div>
        </div>

        <div class="main-app-container">
            <div class="side-container box-style">
                <div class="header-style">Our Gallery</div>
                <div id="gallery"></div>
            </div>

            <div class="chat-container box-style">
                <button id="themeToggle" onclick="toggleDarkMode()" style="position: absolute; top: 15px; right: 45px; background: none; border: none; cursor: pointer; font-size: 20px; z-index: 10;">🌙</button>
                <button onclick="resetChat()" class="btn-reset">Reset Chat</button>
                <div class="color-toggle" onclick="toggleColorMenu()">🎨</div>
                <div id="colorMenu" class="color-menu">
                    <div class="color-grid">
                        <div class="color-option" style="background: linear-gradient(135deg, #d8c6f2, #b49cd9);" onclick="changeBaseColor('190, 160, 230')"></div>
                        <div class="color-option" style="background: linear-gradient(135deg, #ffcce0, #ffb6c1);" onclick="changeBaseColor('255, 182, 193')"></div>
                        <div class="color-option" style="background: linear-gradient(135deg, #e0f7fa, #add8e6);" onclick="changeBaseColor('173, 216, 230')"></div>
                        <div class="color-option" style="background: linear-gradient(135deg, #ccffcc, #90ee90);" onclick="changeBaseColor('144, 238, 144')"></div>
                        <div class="color-option" style="background: linear-gradient(135deg, #ffdb99, #ffa500);" onclick="changeBaseColor('255, 165, 0')"></div>
                        <div class="color-option" style="background: linear-gradient(135deg, #ffb3a7, #ff6347);" onclick="changeBaseColor('255, 99, 71')"></div>
                        <div class="color-option" style="background: linear-gradient(135deg, #ffff99, #ffff00);" onclick="changeBaseColor('255, 255, 0')"></div>
                        <div class="color-option" style="background: linear-gradient(135deg, #333, #000);" onclick="changeBaseColor('0, 0, 0')"></div>
                    </div>
                    <div class="slider-label" style="font-size: 12px; font-weight: bold;">Transparency</div>
                    <input type="range" class="custom-slider" min="0.2" max="1" step="0.1" id="opacitySlider" oninput="changeAlpha(this.value)">
                </div>

                <div id="stickerMenu" class="sticker-menu">
                    <div class="sticker-grid">
                        <img src="cry.png" onclick="sendSticker('cry.png')">
                        <img src="dissapointed.png" onclick="sendSticker('dissapointed.png')">
                        <img src="hungry.png" onclick="sendSticker('hungry.png')">
                        <img src="kiss.png" onclick="sendSticker('kiss.png')">
                        <img src="shocked.png" onclick="sendSticker('shocked.png')">
                        <img src="thinking.png" onclick="sendSticker('thinking.png')">
                    </div>
                </div>

                <div class="chat-header">
                    The Yap Box
                    <div class="user-selector">
                        <input type="radio" id="userShanky" name="userName" value="Shanky" onchange="changeUser(this)">
                        <label for="userShanky">Shanky</label>
                        <input type="radio" id="userReece" name="userName" value="Reece" onchange="changeUser(this)">
                        <label for="userReece">Reece</label>
                    </div>
                </div>

                <div id="pinnedBar" class="pinned-bar" style="display: none;">
                    <div class="pinned-content" id="pinnedContent"></div>
                    <button class="unpin-btn" onclick="unpinMessage()" title="Unpin message">✕</button>
                </div>
                
                <div class="messages" id="messages"></div>
                
                <div id="replyBar" class="reply-bar"></div>
                <div class="chat-inputs">
                    <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleImageUpload(event)">
                   <button onclick="document.getElementById('fileInput').click()" title="Upload Image">📷</button>
                   <button onclick="toggleStickerMenu()" title="Stickers">😊</button>
                    <div class="input-wrapper">
                        <input type="text" id="messageInput" placeholder="Message..." onkeypress="handleKeyPress(event)" oninput="toggleClearBtn()">
                        <div id="clearBtn" class="clear-btn" onclick="clearInput()" title="Clear text">✕</div>
                    </div>
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>

            <div class="side-container box-style">
                <div class="header-style">Bucket List</div>
                <ul id="bucketList" class="bucket-list"></ul>
                <div class="chat-inputs">
                    <input type="text" id="bucketInput" placeholder="New adventure..." onkeypress="handleBucketKeyPress(event)" style="flex-grow:1; border-radius:25px; padding:12px 15px; border:none; outline:none; font-family:'Fredoka',sans-serif;">
                    <button onclick="addBucketItem()">Add</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, child, set, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Sidebar Logic
        window.toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('active'); };

        let galleryImages = [];
        let currentImgIndex = 0;

        window.toggleDarkMode = () => {
            const body = document.body;
            const btn = document.getElementById('themeToggle');
            body.classList.toggle('dark-mode');
            if (body.classList.contains('dark-mode')) { localStorage.setItem('darkmode', 'enabled'); btn.innerText = '☀️'; } 
            else { localStorage.setItem('darkmode', 'disabled'); btn.innerText = '🌙'; }
        };

        window.spawnHeart = () => {
            const heart = document.createElement('div'); heart.innerText = '❤️'; heart.className = 'floating-heart';
            const x = Math.random() * (window.innerWidth - 100) + 50; const y = Math.random() * (window.innerHeight - 100) + 50;
            heart.style.left = `${x}px`; heart.style.top = `${y}px`; document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 1000);
        };

        window.toggleStickerMenu = () => { const menu = document.getElementById('stickerMenu'); menu.style.display = (menu.style.display === 'block') ? 'none' : 'block'; };
        window.sendSticker = (stickerSrc) => { push(messagesRef, { name: currentUser, image: stickerSrc, timestamp: Date.now(), replyTo: replyingTo }); cancelReply(); toggleStickerMenu(); };

        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playPauseBtn');
        const slider = document.getElementById('musicSlider');
        const volSlider = document.getElementById('volumeSlider');
        const songTitle = document.getElementById('songTitle');
        const playlist = [ { title: "Song 1", file: "Song.mp3" }, { title: "Song 2", file: "song2.mp3" } ];
        let currentTrackIndex = 0;
        const loadTrack = (index) => { audio.src = playlist[index].file; songTitle.innerText = playlist[index].title; audio.load(); };
        window.togglePlay = () => { if (audio.paused) { if(!audio.src) loadTrack(currentTrackIndex); audio.play(); playBtn.innerText = '⏸'; } else { audio.pause(); playBtn.innerText = '▶'; } };
        window.nextTrack = () => { currentTrackIndex = (currentTrackIndex + 1) % playlist.length; loadTrack(currentTrackIndex); audio.play(); playBtn.innerText = '⏸'; };
        window.prevTrack = () => { currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length; loadTrack(currentTrackIndex); audio.play(); playBtn.innerText = '⏸'; };
        audio.ontimeupdate = () => { if (isFinite(audio.duration) && audio.duration > 0) { slider.value = (audio.currentTime / audio.duration) * 100; } };
        window.seekAudio = () => { if (isFinite(audio.duration) && audio.duration > 0) { audio.currentTime = (slider.value / 100) * audio.duration; } };
        window.changeVolume = () => { audio.volume = volSlider.value; };
        loadTrack(0);

        let currentMonth = new Date().getMonth(); let currentYear = new Date().getFullYear();
        window.renderCalendar = () => {
            const monthYear = document.getElementById("monthYear"); const calendarDates = document.getElementById("calendarDates");
            if (!monthYear) return;
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            monthYear.innerText = `${monthNames[currentMonth]} ${currentYear}`;
            calendarDates.innerHTML = "";
            const firstDay = new Date(currentYear, currentMonth, 1).getDay(); const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();
            for (let i = 0; i < firstDay; i++) { calendarDates.innerHTML += `<div class="calendar-date"></div>`; }
            for (let i = 1; i <= totalDays; i++) { const today = new Date(); const isToday = i === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear(); calendarDates.innerHTML += `<div class="calendar-date ${isToday ? 'today' : ''}">${i}</div>`; }
        };
        window.changeMonth = (dir) => { currentMonth += dir; if (currentMonth < 0) { currentMonth = 11; currentYear--; } else if (currentMonth > 11) { currentMonth = 0; currentYear++; } window.renderCalendar(); };

        const wrapper = document.getElementById('app-wrapper');
        window.addEventListener('mousemove', (e) => { const centerX = window.innerWidth / 2; const centerY = window.innerHeight / 2; const x = (e.clientX - centerX) / 80; const y = (e.clientY - centerY) / 80; wrapper.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`; wrapper.style.boxShadow = `${-x}px ${y+20}px 50px rgba(0,0,0,0.48)`; });

        const firebaseConfig = { apiKey: "AIzaSyA6FYNW6L3sUd2Adiyp6M0hG_b1IrNuOEY", authDomain: "jayabeth-fdaad.firebaseapp.com", projectId: "jayabeth-fdaad", storageBucket: "jayabeth-fdaad.firebasestorage.app", messagingSenderId: "716510918759", appId: "1:716510918759:web:35340b83ad2a134cecbcc2" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app); const messagesRef = ref(db, "chatroom"); const galleryRef = ref(db, "gallery"); const bucketListRef = ref(db, "bucketlist"); const pinnedRef = ref(db, "pinned");
        let currentUser = localStorage.getItem('yapboxUser') || 'Shanky'; let otherUserLastSeen = 0;
        
        window.addEventListener('DOMContentLoaded', () => {
            const startDate = new Date("2026-04-12T00:00:00"); const today = new Date(); const diffDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
            document.getElementById("days-count").innerText = diffDays;
            window.renderCalendar();
            if (localStorage.getItem('darkmode') === 'enabled') { document.body.classList.add('dark-mode'); document.getElementById('themeToggle').innerText = '☀️'; }
        });

        const updateMyStatus = () => { set(ref(db, `status/${currentUser}`), { lastSeen: Date.now() }); };
        window.addEventListener('focus', updateMyStatus); document.addEventListener('click', updateMyStatus);
        
        window.toggleClearBtn = () => { const input = document.getElementById("messageInput"); document.getElementById("clearBtn").style.display = input.value.length > 0 ? "flex" : "none"; };
        window.clearInput = () => { const input = document.getElementById("messageInput"); input.value = ""; toggleClearBtn(); input.focus(); };
        window.addBucketItem = () => { const input = document.getElementById("bucketInput"); if (input.value.trim() === "") return; push(bucketListRef, { text: input.value, timestamp: Date.now(), creator: currentUser }); input.value = ""; };
        window.deleteBucketItem = (key, btn) => { remove(child(bucketListRef, key)); };
        onValue(bucketListRef, (snapshot) => { const listDiv = document.getElementById("bucketList"); listDiv.innerHTML = ""; if (!snapshot.exists()) return; snapshot.forEach((child) => { const data = child.val(); const key = child.key; const li = document.createElement('li'); li.className = 'bucket-item'; li.innerHTML = `<span>${data.text}</span><button class="delete-item-btn" onclick="deleteBucketItem('${key}', this)">✕</button>`; listDiv.appendChild(li); }); });
        
        window.toggleColorMenu = (e) => { if(e) e.stopPropagation(); const menu = document.getElementById('colorMenu'); menu.style.display = menu.style.display === 'block' ? 'none' : 'block'; };
        window.changeBaseColor = (rgb) => { document.documentElement.style.setProperty('--box-base-rgb', rgb); localStorage.setItem('yapboxRGB', rgb); };
        window.changeAlpha = (val) => { document.documentElement.style.setProperty('--box-alpha', val); localStorage.setItem('yapboxAlpha', val); };
        
        const formatTime = (ts) => { const date = new Date(ts); return date.getHours().toString().padStart(2, '0') + ':' + date.getMinutes().toString().padStart(2, '0'); };
        const formatMessageLinks = (text) => { const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig; return text.replace(urlPattern, '<a href="$1" target="_blank">$1</a>'); };
        let replyingTo = null; 
        window.openLightbox = (src) => { const lightbox = document.getElementById('lightbox'); document.getElementById('lightbox-img').src = src; lightbox.style.display = 'flex'; };
        window.navigateLightbox = (dir) => { currentImgIndex = (currentImgIndex + dir + galleryImages.length) % galleryImages.length; document.getElementById('lightbox-img').src = galleryImages[currentImgIndex]; };
        window.closeLightbox = () => { document.getElementById('lightbox').style.display = 'none'; };
        window.startReply = (text, user) => { replyingTo = { text: text || "[Image]", user: user }; const bar = document.getElementById('replyBar'); bar.style.display = 'block'; bar.innerHTML = `<strong>Replying to ${user}:</strong> ${text || "[Image]"} <span onclick="cancelReply()" style="cursor:pointer; float:right;">✕</span>`; };
        window.cancelReply = () => { replyingTo = null; document.getElementById('replyBar').style.display = 'none'; };
        window.pinMessage = (msgData) => { set(pinnedRef, msgData); };
        window.unpinMessage = () => { remove(pinnedRef); };
        window.deleteMessage = (key) => { remove(child(messagesRef, key)); };
        onValue(pinnedRef, (snapshot) => { const bar = document.getElementById('pinnedBar'); const content = document.getElementById('pinnedContent'); if(snapshot.exists()) { const data = snapshot.val(); content.innerHTML = `<strong>📌 Pinned</strong> - ${data.name}: ${data.text ? data.text : '[Image]'}`; bar.style.display = 'flex'; } else { bar.style.display = 'none'; } });
        
        window.handleImageUpload = (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (event) => { const img = new Image(); img.onload = () => { const canvas = document.createElement('canvas'); const scale = 400 / img.width; canvas.width = 400; canvas.height = img.height * scale; canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height); push(messagesRef, { name: currentUser, image: canvas.toDataURL('image/jpeg', 0.5), timestamp: Date.now(), replyTo: replyingTo }); cancelReply(); }; img.src = event.target.result; }; reader.readAsDataURL(file); };
        window.sendMessage = () => { const input = document.getElementById("messageInput"); if (input.value.trim() === "") return; push(messagesRef, { name: currentUser, text: input.value, timestamp: Date.now(), replyTo: replyingTo }); input.value = ""; toggleClearBtn(); cancelReply(); };
        window.changeUser = (r) => { localStorage.setItem('yapboxUser', r.value); location.reload(); };
        window.handleKeyPress = (e) => { if (e.key === 'Enter') sendMessage(); };
        window.resetChat = () => { if (confirm("Clear Chat?")) { remove(messagesRef); } };
        window.deleteGalleryItem = (event, key) => { event.stopPropagation(); remove(child(galleryRef, key)); };
        
        onValue(messagesRef, (snapshot) => {
            const messagesDiv = document.getElementById("messages"); messagesDiv.innerHTML = ""; if (!snapshot.exists()) return;
            snapshot.forEach((childNode) => {
                const data = childNode.val(); const key = childNode.key; const isMine = data.name === currentUser; const row = document.createElement('div'); row.className = `message-row ${isMine ? 'mine' : 'theirs'}`; 
                const wrapper = document.createElement('div'); wrapper.className = `msg-wrapper ${isMine ? 'mine' : 'theirs'}`; 
                const bubble = document.createElement('div'); bubble.className = `bubble ${isMine ? 'bubble-mine' : 'bubble-theirs'}`; 
                bubble.onclick = () => startReply(data.text || "[Image]", data.name);
                if (data.replyTo) { const quote = document.createElement('div'); quote.style.cssText = "font-size: 0.7em; background: rgba(0,0,0,0.1); padding: 3px; border-radius: 5px; margin-bottom: 5px;"; quote.innerText = `${data.replyTo.user}: ${data.replyTo.text}`; bubble.appendChild(quote); }
                if (data.image) { const img = document.createElement('img'); img.src = data.image; img.style.maxWidth = "200px"; img.onclick = (e) => { e.stopPropagation(); openLightbox(data.image); }; bubble.appendChild(img); } else { bubble.innerHTML += formatMessageLinks(data.text); }
                wrapper.appendChild(bubble); wrapper.appendChild(document.createElement('div')).innerText = formatTime(data.timestamp); wrapper.lastChild.style.fontSize = "10px"; row.appendChild(wrapper); messagesDiv.appendChild(row);
            }); messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
        
        onValue(galleryRef, (snapshot) => {
            const galleryDiv = document.getElementById("gallery"); galleryDiv.innerHTML = ""; galleryImages = [];
            if (!snapshot.exists()) return;
            snapshot.forEach((child) => { const data = child.val(); const key = child.key; galleryImages.push(data.image); const item = document.createElement('div'); item.className = 'gallery-item'; item.innerHTML = `<img src="${data.image}" onclick="openLightbox('${data.image}')"><button class="delete-btn" onclick="deleteGalleryItem(event, '${key}')">✕</button>`; galleryDiv.appendChild(item); });
        });
        if(currentUser === 'Reece') document.getElementById('userReece').checked = true; else document.getElementById('userShanky').checked = true;
    </script>
</body>
</html>
