<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JayaBeth - The Yap Box</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --box-base-rgb: 190, 160, 230;
            --box-alpha: 0.85;
        }

        body { 
            font-family: 'Fredoka', sans-serif; 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh; 
            background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)), #fff9fa url('lilacavo.jpg'); 
            background-size: 650px; 
            animation: moveBackground 144s linear infinite; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            perspective: 1000px; 
            overflow: hidden;
        }
        @keyframes moveBackground { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        /* 3D Wrapper - Shadows increased by 30% */
        #app-wrapper {
            transition: transform 0.1s ease-out, box-shadow 0.3s ease;
            transform-style: preserve-3d;
            border-radius: 25px;
            box-shadow: 0 32px 90px rgba(0,0,0,0.52); 
        }

        .main-app-container { display: flex; gap: 20px; align-items: flex-start; max-width: 1300px; }

        /* Shared Box Style - Shadows increased by 30% */
        .box-style { 
            background-color: rgba(var(--box-base-rgb), var(--box-alpha));
            background-image: radial-gradient(rgba(255, 255, 255, 0.3) 1px, transparent 1px);
            background-size: 20px 20px;
            backdrop-filter: blur(5px); 
            border-radius: 25px; 
            border: 1px solid #000; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.20), 0 0 115px rgba(0,0,0,0.11); 
            padding: 15px; 
            box-sizing: border-box; 
        }

        /* Left Side Container */
        .left-column { display: flex; flex-direction: column; gap: 20px; width: 145px; }

        /* Date Counter */
        .date-box { text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; padding: 20px 15px; }
        .date-number { font-size: 2.8em; font-weight: 700; color: #8a2be2; line-height: 1; text-shadow: 1px 1px 0px rgba(255,255,255,0.7); }
        .date-text { font-size: 0.9em; font-weight: 600; color: #333; line-height: 1.2; }

        /* Music Player */
        .music-box { padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .song-title { font-size: 0.85em; font-weight: bold; color: #333; text-align: center; }
        #playPauseBtn { background: #8a2be2; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 16px; transition: transform 0.2s, background 0.2s; }
        #playPauseBtn:hover { transform: scale(1.1); filter: brightness(1.1); }
        #musicSlider { width: 100%; cursor: pointer; accent-color: #8a2be2; }

        /* Calendar Styles */
        .calendar-box { padding: 12px 10px; display: flex; flex-direction: column; align-items: center; }
        .calendar-header { display: flex; justify-content: space-between; width: 100%; font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #333; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; width: 100%; }
        .cal-day-label { font-size: 10px; font-weight: bold; text-align: center; color: #444; margin-bottom: 3px; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; cursor: pointer; background: rgba(255,255,255,0.4); border-radius: 6px; position: relative; transition: 0.2s; color: #222; }
        .cal-day:hover { background: rgba(255,255,255,0.8); transform: scale(1.05); }
        .has-event { background: #8a2be2 !important; color: white; font-weight: bold; box-shadow: 0 2px 5px rgba(138,43,226,0.4); }

        /* Modals and Overlays */
        .lightbox-overlay, .event-modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); z-index:9999; display:none; align-items:center; justify-content:center; }
        .event-modal-content { background: white; padding: 20px; border-radius: 15px; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* Side Containers */
        .side-container { width: 260px; height: 600px; display: flex; flex-direction: column; }
        .header-style { font-weight: bold; color: #333; margin-bottom: 10px; text-align: center; border-bottom: 2px solid rgba(255, 255, 255, 0.5); padding-bottom: 10px; font-size: 1.1em; }

        /* Gallery */
        #gallery { flex-grow: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; align-content: flex-start; padding-right: 5px; }
        .gallery-item { position: relative; width: 100%; aspect-ratio: 1; border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid #000; box-sizing: border-box; transition: transform 0.2s; }
        .gallery-item:hover { transform: scale(1.03); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.7); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; z-index: 2; font-size: 10px; transition: transform 0.2s; }
        .delete-btn:hover { transform: scale(1.2); }

        /* Bucket List */
        .bucket-list { flex-grow: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
        .bucket-item { background: rgba(255, 255, 255, 0.4); padding: 10px 12px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; word-break: break-word; animation: fadeIn 0.3s ease; }
        .delete-item-btn { background: none; border: none; color: #ff4d4d; cursor: pointer; font-weight: bold; padding: 0 5px; font-size: 16px; opacity: 0.7; transition: 0.2s; }

        /* Chat */
        .chat-container { width: 400px; height: 600px; display: flex; flex-direction: column; position: relative; }
        .btn-reset { position: absolute; top: 20px; left: 20px; background: none; border: none; color: #333; font-size: 11px; cursor: pointer; text-decoration: underline; }
        .color-toggle { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 20px; z-index: 10; }
        .color-menu { display: none; position: absolute; top: 45px; right: 15px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 7px 20px rgba(0,0,0,0.26); z-index: 20; width: 180px; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .color-option { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 1px solid #ccc; transition: transform 0.2s; }
        .color-option:hover { transform: scale(1.15); }
        .chat-header { font-weight: bold; color: #333; margin-bottom: 10px; text-align: center; padding-bottom: 10px; font-size: 1.3em; border-bottom: 2px solid rgba(255, 255, 255, 0.5); }
        .messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px; }
        .message-row { display: flex; width: 100%; position: relative; }
        .message-row.mine { justify-content: flex-end; }
        .message-row.theirs { justify-content: flex-start; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 75%; position: relative; }
        .msg-wrapper.mine { align-items: flex-end; }
        .msg-wrapper.theirs { align-items: flex-start; }
        .bubble { padding: 10px 24px 10px 14px; border-radius: 20px; font-size: 15px; position: relative; word-wrap: break-word; cursor: pointer; white-space: pre-wrap; box-shadow: 0 2px 5px rgba(0,0,0,0.08); }
        .bubble-mine { background-color: #8a2be2; color: white; border-bottom-right-radius: 4px; }
        .bubble-theirs { background-color: #ffffff; color: #333; border-bottom-left-radius: 4px; }
        .chat-inputs { display: flex; flex-direction: row; gap: 8px; margin-top: 10px; align-items: center; }
        .input-wrapper { display: flex; flex-grow: 1; position: relative; align-items: center; }
        .input-wrapper input { width: 100%; padding: 12px 35px 12px 15px; border: none; border-radius: 25px; outline: none; font-family: 'Fredoka', sans-serif; box-sizing: border-box; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .chat-inputs button { padding: 10px 15px; border: none; border-radius: 25px; background: linear-gradient(135deg, #b19cd9, #8a2be2); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .chat-inputs button:hover { transform: scale(1.1); filter: brightness(1.15); }
    </style>
</head>

<body>
    <!-- Lightbox -->
    <div id="lightbox" class="lightbox-overlay" onclick="closeLightbox()">
        <span class="close-lightbox" style="position:absolute; top:30px; right:40px; font-size:40px; color:white; cursor:pointer;">&times;</span>
        <img id="lightbox-img" style="max-width:90%; max-height:90%; border-radius:15px;" src="">
    </div>

    <!-- Event Modal -->
    <div id="eventModal" class="event-modal">
        <div class="event-modal-content">
            <h3 id="modalDateTitle" style="margin-top:0; color:#333;">Add Event</h3>
            <div id="eventsList" style="margin-bottom:15px; max-height:150px; overflow-y:auto; font-size:14px; color:#555;"></div>
            <input type="text" id="eventInput" placeholder="What's happening?" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ccc; box-sizing:border-box; font-family:'Fredoka', sans-serif;">
            <div style="margin-top:15px; display:flex; gap:10px;">
                <button onclick="saveEvent()" style="flex:1; padding:10px; background:#8a2be2; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">Save</button>
                <button onclick="closeEventModal()" style="flex:1; padding:10px; background:#ccc; color:#333; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">Close</button>
            </div>
        </div>
    </div>

    <div id="app-wrapper">
        <div class="main-app-container">
            
            <!-- LEFT COLUMN: Date + Music + Calendar -->
            <div class="left-column">
                <div class="date-box box-style">
                    <div class="date-text">It was official</div>
                    <div class="date-number" id="days-count">0</div>
                    <div class="date-text">days ago</div>
                </div>

                <div class="music-box box-style">
                    <audio id="audioPlayer" src="Song.mp3"></audio>
                    <div class="song-title">Play some vibes</div>
                    <button id="playPauseBtn" onclick="togglePlay()">▶</button>
                    <input type="range" id="musicSlider" value="0" min="0" max="100" oninput="seekAudio()">
                </div>

                <!-- Calendar UI -->
                <div class="calendar-box box-style" id="calendar">
                    <div class="calendar-header">
                        <span onclick="prevMonth()" style="cursor:pointer; padding:0 5px;">&lt;</span>
                        <span id="monthDisplay">Month</span>
                        <span onclick="nextMonth()" style="cursor:pointer; padding:0 5px;">&gt;</span>
                    </div>
                    <div class="calendar-grid" id="calendarGrid"></div>
                </div>
            </div>

            <!-- Left Center: Gallery -->
            <div class="side-container box-style">
                <div class="header-style">Our Gallery</div>
                <div id="gallery"></div>
            </div>

            <!-- Center: Chat -->
            <div class="chat-container box-style">
                <button onclick="resetChat()" class="btn-reset">Reset Chat</button>
                <div class="color-toggle" onclick="toggleColorMenu()">🎨</div>
                <div id="colorMenu" class="color-menu">
                    <div class="color-grid">
                        <div class="color-option" style="background: #bea0e6;" onclick="changeBaseColor('190, 160, 230')"></div>
                        <div class="color-option" style="background: #ffb6c1;" onclick="changeBaseColor('255, 182, 193')"></div>
                        <div class="color-option" style="background: #a0c4ff;" onclick="changeBaseColor('160, 196, 255')"></div>
                        <div class="color-option" style="background: #9bf6ff;" onclick="changeBaseColor('155, 246, 255')"></div>
                        <div class="color-option" style="background: #caffbf;" onclick="changeBaseColor('202, 255, 191')"></div>
                        <div class="color-option" style="background: #fdffb6;" onclick="changeBaseColor('253, 255, 182')"></div>
                        <div class="color-option" style="background: #ffd6a5;" onclick="changeBaseColor('255, 214, 165')"></div>
                        <div class="color-option" style="background: #ffadad;" onclick="changeBaseColor('255, 173, 173')"></div>
                    </div>
                    <input type="range" min="0.2" max="1" step="0.1" id="opacitySlider" oninput="changeAlpha(this.value)" style="width: 100%;">
                </div>

                <div class="chat-header">The Yap Box</div>
                <div class="messages" id="messages"></div>
                
                <div class="chat-inputs">
                    <button onclick="document.getElementById('fileInput').click()">📷</button>
                    <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleImageUpload(event)">
                    <div class="input-wrapper">
                        <input type="text" id="messageInput" placeholder="Message..." onkeypress="handleKeyPress(event)">
                    </div>
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>

            <!-- Right: Bucket List -->
            <div class="side-container box-style">
                <div class="header-style">Bucket List</div>
                <ul id="bucketList" class="bucket-list"></ul>
                <div class="chat-inputs">
                    <input type="text" id="bucketInput" placeholder="New adventure...">
                    <button onclick="addBucketItem()">Add</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, child, set, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Firebase Config 
        const firebaseConfig = { 
            apiKey: "AIzaSyA6FYNW6L3sUd2Adiyp6M0hG_b1IrNuOEY", 
            authDomain: "jayabeth-fdaad.firebaseapp.com", 
            projectId: "jayabeth-fdaad", 
            storageBucket: "jayabeth-fdaad.firebasestorage.app", 
            messagingSenderId: "716510918759", 
            appId: "1:716510918759:web:35340b83ad2a134cecbcc2" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // References
        const eventsRef = ref(db, "events");
        const messagesRef = ref(db, "messages");
        const bucketRef = ref(db, "bucket");
        const galleryRef = ref(db, "gallery");

        // --- Date Counter ---
        const startDate = new Date("2024-01-01"); // Replace with your actual official date!
        const today = new Date();
        const diffTime = Math.abs(today - startDate);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        document.getElementById("days-count").innerText = diffDays;

        // --- Theme / Color Options ---
        window.toggleColorMenu = () => {
            const menu = document.getElementById("colorMenu");
            menu.style.display = menu.style.display === "block" ? "none" : "block";
        };
        window.changeBaseColor = (rgb) => { document.documentElement.style.setProperty('--box-base-rgb', rgb); };
        window.changeAlpha = (val) => { document.documentElement.style.setProperty('--box-alpha', val); };

        // --- Music Player Logic ---
        const audio = document.getElementById("audioPlayer");
        window.togglePlay = () => {
            const btn = document.getElementById("playPauseBtn");
            if (audio.paused) { audio.play(); btn.innerText = "⏸"; } 
            else { audio.pause(); btn.innerText = "▶"; }
        };
        audio.ontimeupdate = () => {
            const slider = document.getElementById("musicSlider");
            slider.value = (audio.currentTime / audio.duration) * 100 || 0;
        };
        window.seekAudio = () => {
            const slider = document.getElementById("musicSlider");
            audio.currentTime = (slider.value / 100) * audio.duration;
        };

        // --- Calendar Logic ---
        let date = new Date();
        let selectedDate = "";
        let events = {};

        const renderCalendar = () => {
            const year = date.getFullYear();
            const month = date.getMonth();
            document.getElementById("monthDisplay").innerText = date.toLocaleString('default', { month: 'short' }) + " " + year;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById("calendarGrid");
            
            grid.innerHTML = `
                <div class="cal-day-label">S</div><div class="cal-day-label">M</div>
                <div class="cal-day-label">T</div><div class="cal-day-label">W</div>
                <div class="cal-day-label">T</div><div class="cal-day-label">F</div>
                <div class="cal-day-label">S</div>
            `;

            for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;
            for(let i=1; i<=daysInMonth; i++) {
                const dateStr = `${year}-${month+1}-${i}`;
                const hasEvent = events[dateStr] ? "has-event" : "";
                grid.innerHTML += `<div class="cal-day ${hasEvent}" onclick="openEventModal('${dateStr}')">${i}</div>`;
            }
        };

        window.prevMonth = () => { date.setMonth(date.getMonth() - 1); renderCalendar(); };
        window.nextMonth = () => { date.setMonth(date.getMonth() + 1); renderCalendar(); };

        window.openEventModal = (d) => {
            selectedDate = d;
            document.getElementById("modalDateTitle").innerText = "Events for " + d;
            document.getElementById("eventModal").style.display = "flex";
            const list = document.getElementById("eventsList");
            list.innerHTML = "";
            if(events[d]) {
                Object.keys(events[d]).forEach(k => {
                    list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:8px; background:#f0f0f0; padding:5px 8px; border-radius:5px;"><span>${events[d][k].text}</span> <button onclick="deleteEvent('${k}')" style="border:none; background:none; color:red; cursor:pointer; font-weight:bold;">✕</button></div>`;
                });
            }
        };

        window.closeEventModal = () => document.getElementById("eventModal").style.display = "none";

        window.saveEvent = () => {
            const txt = document.getElementById("eventInput").value;
            if(!txt) return;
            push(child(eventsRef, selectedDate), { text: txt });
            document.getElementById("eventInput").value = "";
            closeEventModal();
        };

        window.deleteEvent = (key) => { remove(child(eventsRef, `${selectedDate}/${key}`)); closeEventModal(); };

        onValue(eventsRef, (snapshot) => {
            events = snapshot.val() || {};
            renderCalendar();
        });

        renderCalendar();

        // --- Chat Logic ---
        window.sendMessage = () => {
            const input = document.getElementById("messageInput");
            if (input.value.trim() === "") return;
            // Assuming default sender is "me" since there's no user selector in the UI
            push(messagesRef, { text: input.value, sender: "me", timestamp: Date.now() });
            input.value = "";
        };

        window.handleKeyPress = (e) => { if (e.key === 'Enter') sendMessage(); };
        window.resetChat = () => { remove(messagesRef); };

        onValue(messagesRef, (snapshot) => {
            const messages = snapshot.val() || {};
            const container = document.getElementById("messages");
            container.innerHTML = "";
            Object.values(messages).forEach(msg => {
                const isMine = msg.sender === "me";
                container.innerHTML += `
                    <div class="message-row ${isMine ? 'mine' : 'theirs'}">
                        <div class="msg-wrapper ${isMine ? 'mine' : 'theirs'}">
                            <div class="bubble ${isMine ? 'bubble-mine' : 'bubble-theirs'}">${msg.text}</div>
                        </div>
                    </div>`;
            });
            container.scrollTop = container.scrollHeight;
        });

        // --- Bucket List Logic ---
        window.addBucketItem = () => {
            const input = document.getElementById("bucketInput");
            if (input.value.trim() === "") return;
            push(bucketRef, { text: input.value });
            input.value = "";
        };

        window.deleteBucketItem = (key) => { remove(child(bucketRef, key)); };

        onValue(bucketRef, (snapshot) => {
            const items = snapshot.val() || {};
            const list = document.getElementById("bucketList");
            list.innerHTML = "";
            Object.keys(items).forEach(k => {
                list.innerHTML += `
                    <li class="bucket-item">
                        ${items[k].text} 
                        <button class="delete-item-btn" onclick="deleteBucketItem('${k}')">✕</button>
                    </li>`;
            });
        });

        // --- Gallery & Lightbox Logic ---
        window.handleImageUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                push(galleryRef, { img: event.target.result });
            };
            reader.readAsDataURL(file);
        };

        window.deleteImage = (key, event) => {
            event.stopPropagation();
            remove(child(galleryRef, key));
        };

        window.openLightbox = (src) => {
            document.getElementById("lightbox-img").src = src;
            document.getElementById("lightbox").style.display = "flex";
        };

        window.closeLightbox = () => {
            document.getElementById("lightbox").style.display = "none";
        };

        onValue(galleryRef, (snapshot) => {
            const images = snapshot.val() || {};
            const gallery = document.getElementById("gallery");
            gallery.innerHTML = "";
            Object.keys(images).forEach(k => {
                gallery.innerHTML += `
                    <div class="gallery-item" onclick="openLightbox('${images[k].img}')">
                        <img src="${images[k].img}">
                        <button class="delete-btn" onclick="deleteImage('${k}', event)">✕</button>
                    </div>`;
            });
        });
    </script>
</body>
</html>
